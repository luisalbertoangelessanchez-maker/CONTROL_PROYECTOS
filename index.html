<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANGELES GROUP · TeamProjects</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#08090d;--sf:#0f1117;--sf2:#161b26;--sf3:#1c2133;--bd:#1e2538;--bd2:#283048;--ac:#f59e0b;--ac2:#fb923c;--gn:#22c55e;--rd:#ef4444;--bl:#3b82f6;--pu:#a855f7;--cy:#06b6d4;--tx:#dde3f0;--tx2:#7d8ba0;--tx3:#3d4a5c;--r:10px;}
body{background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.5;overflow-x:hidden}
button{font-family:'DM Sans',sans-serif;cursor:pointer;border:none;outline:none}
input,select,textarea{font-family:'DM Sans',sans-serif;outline:none}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:99px}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.fade{animation:fadeIn .3s ease both}
.inp{width:100%;background:var(--sf2);border:1.5px solid var(--bd2);color:var(--tx);border-radius:var(--r);padding:9px 13px;font-size:13px;transition:border .2s,box-shadow .2s}
.inp:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(245,158,11,.1)}
.inp::placeholder{color:var(--tx3)}
.lbl{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--tx2);margin-bottom:5px;display:block}
.fg{margin-bottom:14px}
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:var(--r);font-size:13px;font-weight:600;transition:all .2s;white-space:nowrap;cursor:pointer;border:none}
.btn-p{background:var(--ac);color:#000}.btn-p:hover{background:#fbbf24;transform:translateY(-1px);box-shadow:0 4px 20px rgba(245,158,11,.3)}
.btn-g{background:transparent;color:var(--tx2);border:1.5px solid var(--bd2)}.btn-g:hover{color:var(--tx);background:var(--sf2)}
.btn-d{background:rgba(239,68,68,.1);color:#ef4444;border:1px solid rgba(239,68,68,.18)}.btn-d:hover{background:rgba(239,68,68,.2)}
.btn-s{padding:5px 11px!important;font-size:12px!important}
.card{background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:20px}
.pb{height:5px;background:var(--sf3);border-radius:99px;overflow:hidden}
.pf{height:100%;border-radius:99px;transition:width .5s}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.82);backdrop-filter:blur(8px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
.md{background:var(--sf);border:1px solid var(--bd2);border-radius:16px;padding:28px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;box-shadow:0 32px 100px rgba(0,0,0,.7);animation:fadeIn .2s ease}
.sb{position:fixed;left:0;top:0;bottom:0;width:228px;background:var(--sf);border-right:1px solid var(--bd);display:flex;flex-direction:column;z-index:100}
.ni{display:flex;align-items:center;gap:10px;padding:10px 16px;border-radius:8px;margin:2px 8px;color:var(--tx2);cursor:pointer;transition:all .2s;font-size:13px;font-weight:500;user-select:none}
.ni:hover{background:var(--sf2);color:var(--tx)}.ni.act{background:rgba(245,158,11,.08);color:var(--ac);border:1px solid rgba(245,158,11,.12)}
.ns{padding:14px 16px 5px;font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--tx3)}
.main{margin-left:228px;min-height:100vh;padding:30px}
.tbl{width:100%;border-collapse:collapse}
.tbl th{padding:10px 14px;text-align:left;font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--tx3);border-bottom:1px solid var(--bd)}
.tbl td{padding:11px 14px;border-bottom:1px solid var(--bd);vertical-align:middle}
.tbl tr:hover td{background:var(--sf2)}.tbl tr:last-child td{border-bottom:none}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:600;white-space:nowrap}
.b-gray{background:rgba(74,85,104,.15);color:#8892a4;border:1px solid rgba(74,85,104,.2)}
.b-blue{background:rgba(59,130,246,.1);color:#3b82f6;border:1px solid rgba(59,130,246,.18)}
.b-green{background:rgba(34,197,94,.1);color:#22c55e;border:1px solid rgba(34,197,94,.18)}
.b-red{background:rgba(239,68,68,.1);color:#ef4444;border:1px solid rgba(239,68,68,.18)}
.b-amber{background:rgba(245,158,11,.1);color:#f59e0b;border:1px solid rgba(245,158,11,.18)}
.b-purple{background:rgba(168,85,247,.1);color:#a855f7;border:1px solid rgba(168,85,247,.18)}
.b-cyan{background:rgba(6,182,212,.1);color:#06b6d4;border:1px solid rgba(6,182,212,.18)}
.av{border-radius:50%;background:linear-gradient(135deg,var(--ac),var(--ac2));display:flex;align-items:center;justify-content:center;font-weight:700;color:#000;flex-shrink:0}
#toast{position:fixed;top:20px;right:20px;z-index:9999;padding:12px 20px;border-radius:10px;font-weight:600;font-size:13px;box-shadow:0 8px 40px rgba(0,0,0,.5);display:none;max-width:360px;animation:fadeIn .3s ease}
#demo-bar{position:fixed;top:0;left:228px;right:0;height:3px;background:var(--sf3);z-index:200;display:none}
#demo-fill{height:100%;background:linear-gradient(90deg,var(--gn),var(--ac),var(--rd));transition:width 1s linear}
#demo-banner{position:fixed;top:3px;left:228px;right:0;background:rgba(245,158,11,.12);border-bottom:1px solid rgba(245,158,11,.2);padding:6px 20px;font-size:12px;color:var(--ac);z-index:199;display:none;text-align:center;font-weight:600}
#queue-box{position:fixed;bottom:20px;right:20px;background:var(--sf2);border:1px solid var(--bd2);border-radius:14px;padding:18px 22px;z-index:300;min-width:290px;box-shadow:0 8px 40px rgba(0,0,0,.5);display:none;animation:fadeIn .3s ease}
.star-row{display:flex;gap:2px;align-items:center}
.si{font-size:18px;cursor:pointer;transition:transform .1s;display:inline-block;line-height:1;user-select:none}
.si:hover{transform:scale(1.3)}.si.lk{cursor:default}.si.lk:hover{transform:none}
.tab{padding:7px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;color:var(--tx2);background:transparent;border:none;transition:all .2s}
.tab.act{background:rgba(245,158,11,.1);color:var(--ac)}.tab:hover:not(.act){background:var(--sf3);color:var(--tx)}
.hchip{display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:6px;font-size:10px;background:rgba(168,85,247,.1);color:#a855f7;border:1px solid rgba(168,85,247,.18);cursor:pointer;margin-top:3px}
.hchip:hover{background:rgba(168,85,247,.2)}
</style>
</head>
<body>
<div id="toast"></div>
<div id="demo-bar"><div id="demo-fill" style="width:100%"></div></div>
<div id="demo-banner"></div>

<!-- LOGIN -->
<div id="page-login" class="fade" style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);position:relative;overflow:hidden">
  <div style="position:absolute;top:8%;left:3%;width:600px;height:600px;background:radial-gradient(circle,rgba(245,158,11,.04) 0%,transparent 65%);border-radius:50%;pointer-events:none"></div>
  <div style="position:absolute;bottom:5%;right:3%;width:400px;height:400px;background:radial-gradient(circle,rgba(59,130,246,.04) 0%,transparent 65%);border-radius:50%;pointer-events:none"></div>
  <div style="width:100%;max-width:460px;padding:0 20px;z-index:1">
    <div style="text-align:center;margin-bottom:28px">
      <div style="display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,#1e3a5f,#0f2340);border:1px solid rgba(59,130,246,.3);border-radius:10px;padding:8px 16px;margin-bottom:10px">
        <span style="font-size:22px">&#x1F985;</span>
        <span style="font-family:'Bebas Neue',sans-serif;font-size:16px;color:#60a5fa;letter-spacing:2px">ANGELES GROUP</span>
      </div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:44px;color:var(--ac);letter-spacing:3px;line-height:1">TeamProjects</div>
      <div style="font-size:13px;color:var(--tx3);margin-top:4px">Sistema de control de Proyectos en equipo</div>
    </div>
    <div style="display:flex;gap:4px;background:var(--sf2);border-radius:10px;padding:4px;margin-bottom:14px">
      <button id="tab-login" class="tab act" style="flex:1" onclick="switchTab('login')">Iniciar sesion</button>
      <button id="tab-reg" class="tab" style="flex:1" onclick="switchTab('register')">Registrarse</button>
    </div>
    <!-- LOGIN -->
    <div id="form-login" class="card" style="border:1px solid var(--bd2)">
      <div class="fg"><label class="lbl">Correo electronico</label>
        <input class="inp" type="email" id="li-email" placeholder="usuario@empresa.com" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <div class="fg"><label class="lbl">Contrasena</label>
        <input class="inp" type="password" id="li-pass" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <div id="li-err" style="display:none;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#ef4444;padding:10px 14px;border-radius:8px;font-size:12px;margin-bottom:14px"></div>
      <button class="btn btn-p" style="width:100%;justify-content:center;padding:11px;margin-bottom:8px" onclick="doLogin()"><span id="li-txt">Ingresar al sistema &rarr;</span></button>
      <button class="btn btn-g" style="width:100%;justify-content:center" onclick="openRecoverPass()">Olvide mi contrasena</button>
      <div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--bd)">
        <button class="btn" id="demo-btn" style="width:100%;justify-content:center;padding:11px;background:linear-gradient(135deg,rgba(6,182,212,.1),rgba(168,85,247,.1));color:var(--cy);border:1px solid rgba(6,182,212,.25);font-weight:700" onclick="openDemoEntry()">
          &#x1F680; Probar Demo &mdash; 2 horas gratis
        </button>
        <div id="demo-slot-info" style="font-size:10px;color:var(--tx3);text-align:center;margin-top:5px">Cargando disponibilidad...</div>
      </div>
    </div>
    <!-- REGISTER -->
    <div id="form-register" class="card" style="border:1px solid var(--bd2);display:none">
      <div style="background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.18);border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:12px;color:var(--bl)">
        Tu cuenta se activa cuando un administrador te incluya en un proyecto.
      </div>
      <div class="fg"><label class="lbl">Nombre completo</label><input class="inp" id="rg-name" placeholder="Ej: Maria Torres"></div>
      <div class="fg"><label class="lbl">Correo electronico</label><input class="inp" type="email" id="rg-email" placeholder="tu@email.com"></div>
      <div class="fg"><label class="lbl">Contrasena</label><input class="inp" type="password" id="rg-pass" placeholder="Minimo 6 caracteres"></div>
      <div class="fg"><label class="lbl">Confirmar contrasena</label><input class="inp" type="password" id="rg-pass2" placeholder="Repite tu contrasena"></div>
      <div id="rg-err" style="display:none;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#ef4444;padding:10px 14px;border-radius:8px;font-size:12px;margin-bottom:14px"></div>
      <button class="btn btn-p" style="width:100%;justify-content:center;padding:11px" onclick="doRegister()">Crear cuenta &rarr;</button>
    </div>
  </div>
  <!-- QUEUE BOX -->
  <div id="queue-box">
    <div style="font-weight:700;font-size:14px;margin-bottom:8px;color:var(--ac)">&#x1F550; Cola de espera</div>
    <div id="queue-msg" style="font-size:13px;color:var(--tx2);margin-bottom:10px"></div>
    <div style="background:var(--sf3);border-radius:8px;height:6px;overflow:hidden;margin-bottom:8px"><div id="queue-prog" style="height:100%;background:var(--ac);border-radius:8px;transition:width 2s linear;width:0%"></div></div>
    <div id="queue-eta" style="font-size:12px;color:var(--tx3);margin-bottom:10px"></div>
    <button class="btn btn-d btn-s" style="width:100%;justify-content:center" onclick="leaveQueue()">Salir de la cola</button>
  </div>
</div>

<!-- APP -->
<div id="page-app" style="display:none">
  <nav class="sb">
    <div style="padding:18px 16px;border-bottom:1px solid var(--bd)">
      <div style="display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,#1e3a5f,#0f2340);border:1px solid rgba(59,130,246,.25);border-radius:8px;padding:5px 10px;margin-bottom:6px">
        <span style="font-size:13px">&#x1F985;</span>
        <span style="font-family:'Bebas Neue',sans-serif;font-size:11px;color:#60a5fa;letter-spacing:1.5px">ANGELES GROUP</span>
      </div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--ac);letter-spacing:1.5px;line-height:1">TeamProjects</div>
      <div style="font-size:9px;color:var(--tx3);letter-spacing:.5px">Control de Proyectos en equipo</div>
    </div>
    <div id="sb-nav" style="flex:1;overflow-y:auto;padding:6px 0"></div>
    <div style="border-top:1px solid var(--bd);padding:10px">
      <div style="display:flex;align-items:center;gap:8px;padding:8px;margin-bottom:4px">
        <div id="sb-av" class="av" style="width:30px;height:30px;font-size:11px"></div>
        <div style="flex:1;min-width:0">
          <div id="sb-name" style="font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis"></div>
          <div id="sb-role" style="font-size:10px;color:var(--tx3)"></div>
        </div>
        <button onclick="toggleNotifs()" style="background:transparent;border:1px solid var(--bd2);color:var(--tx2);border-radius:8px;padding:5px 7px;font-size:14px;cursor:pointer;position:relative">
          &#x1F514;<span id="nb" style="display:none;position:absolute;top:-4px;right:-4px;background:var(--rd);color:#fff;min-width:15px;height:15px;border-radius:50%;font-size:9px;align-items:center;justify-content:center;font-weight:700"></span>
        </button>
      </div>
      <div id="demo-sb-info" style="display:none;margin-bottom:6px;padding:8px 10px;background:rgba(6,182,212,.08);border:1px solid rgba(6,182,212,.18);border-radius:8px;font-size:11px;color:var(--cy)">
        &#x1F680; DEMO &bull; <span id="demo-timer-txt"></span>
      </div>
      <div class="ni" onclick="showView('profile')">&#x1F464; <span>Mi Perfil</span></div>
      <div class="ni" onclick="doLogout()">&rarr; <span>Cerrar sesion</span></div>
    </div>
  </nav>
  <div id="notif-panel" style="display:none;position:fixed;bottom:80px;left:232px;width:320px;background:var(--sf2);border:1px solid var(--bd2);border-radius:14px;z-index:200;box-shadow:0 16px 60px rgba(0,0,0,.6)">
    <div style="padding:12px 16px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center">
      <span style="font-weight:700;font-size:13px">&#x1F514; Notificaciones</span>
      <button class="btn btn-g btn-s" onclick="markAllRead()">Leidas</button>
    </div>
    <div id="notif-list" style="max-height:280px;overflow-y:auto"></div>
  </div>
  <main class="main">
    <div id="view-content" class="fade"></div>
  </main>
</div>
<div id="modal-wrap" style="display:none" class="mo" onclick="if(event.target===this)closeModal()">
  <div class="md" id="modal-inner"></div>
</div>
<script>
// ═══ CONFIG ════════════════════════════════════════════════════════
const SUPABASE_URL="https://kmjercxkgypegtaxugdf.supabase.co";
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImttamVyY3hrZ3lwZWd0YXh1Z2RmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5MjQ2MTEsImV4cCI6MjA4ODUwMDYxMX0.ii-zRmr19HACkZc6SbwVDZJjpO7ixEXAXjCGEQ2UrkA";
const IS_CFG=!SUPABASE_URL.includes("REEMPLAZA");
const sb=IS_CFG?window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY):null;
const SUPER={id:'sa',name:'Super Admin',email:'super@angelesgroup.io',role:'superadmin',password:'Angeles2024!'};
const DEMO_MS=2*60*60*1000, MAX_SLOTS=5;
const COLS=['#f59e0b','#22c55e','#3b82f6','#a855f7','#06b6d4','#fb923c'];

// ═══ STATE ═════════════════════════════════════════════════════════
let SESSION=null,SEL_PROJ=null,NOTIFS=[],IS_DEMO=false,DEMO_START=null;
let DEMO_IV=null,QUEUE_IV=null,MY_QID=null,currentView='';
let OPEN_STAGES={},OPEN_ACTS={},TASK_FILTER='mine';

// ═══ HELPERS ═══════════════════════════════════════════════════════
const TODAY=new Date();TODAY.setHours(0,0,0,0);
const fmtISO=d=>d instanceof Date?d.toISOString().split('T')[0]:(d||'');
const fmtD=d=>{try{return new Date(d).toLocaleDateString('es-PE');}catch{return d||'';}};
const addD=(d,n)=>{const x=new Date(d);x.setDate(x.getDate()+n);return fmtISO(x);};
const diffD=(a,b)=>Math.max(0,Math.round((new Date(b)-new Date(a))/86400000));
const ini=n=>(n||'?').trim().split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
const s2p=s=>[0,20,40,60,80,100][s]||0;
const uid=p=>p+Date.now()+Math.random().toString(36).slice(2,5);
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const getEv=t=>{try{const e=t.evidence;return Array.isArray(e)?e:(typeof e==='string'?JSON.parse(e||'[]'):[]);}catch{return[];}};
const getHist=t=>{try{const h=t.history||'[]';return Array.isArray(h)?h:(typeof h==='string'?JSON.parse(h):[]);}catch{return[];}};
function calcSt(t){
  const now=TODAY,s=new Date(t.start_date),e=new Date(t.end_date);
  const done=getEv(t).length>0||t.stars===5;
  if(done)return now<=e?{label:'Ejecutado en plazo',cls:'b-green',icon:'&#10003;'}:{label:'Ejecutado fuera de plazo',cls:'b-amber',icon:'&#10003;'};
  if(t.stars>0)return now<=e?{label:'En proceso - en plazo',cls:'b-blue',icon:'&#9658;'}:{label:'En proceso - fuera de plazo',cls:'b-red',icon:'&#9888;'};
  if(now<s)return{label:'No iniciado',cls:'b-gray',icon:'&#9675;'};
  return{label:'No iniciado - fuera de plazo',cls:'b-red',icon:'&#10005;'};
}

// ═══ LOCALSTORAGE ══════════════════════════════════════════════════
const lsG=(k,d)=>{try{const v=localStorage.getItem('tp_'+k);return v?JSON.parse(v):d;}catch{return d;}};
const lsS=(k,v)=>{try{localStorage.setItem('tp_'+k,JSON.stringify(v));}catch{}};
const lsUp=(k,item)=>{const a=lsG(k,[]);const i=a.findIndex(x=>x.id===item.id);if(i>=0)a[i]={...a[i],...item};else a.push(item);lsS(k,a);};
const lsDel=(k,id)=>lsS(k,lsG(k,[]).filter(x=>x.id!==id));
const lsPatch=(k,id,p)=>{const a=lsG(k,[]);const i=a.findIndex(x=>x.id===id);if(i>=0)a[i]={...a[i],...p};lsS(k,a);};

// ═══ DEMO SLOTS ════════════════════════════════════════════════════
function getSlots(){return lsG('demo_slots',[]);}
function cleanSlots(){lsS('demo_slots',getSlots().filter(s=>s.exp>Date.now()));}
function countSlots(){cleanSlots();return getSlots().length;}
function claimSlot(id,name){cleanSlots();const sl=getSlots();if(sl.length>=MAX_SLOTS)return false;sl.push({id,name,started:Date.now(),exp:Date.now()+DEMO_MS});lsS('demo_slots',sl);return true;}
function releaseSlot(id){lsS('demo_slots',getSlots().filter(s=>s.id!==id));}
function refreshSlot(id){const sl=getSlots();const s=sl.find(x=>x.id===id);if(s){s.exp=s.started+DEMO_MS;lsS('demo_slots',sl);}}
function getSlotExp(id){const s=getSlots().find(x=>x.id===id);return s?s.exp:null;}
function getQueue(){return lsG('demo_queue',[]);}
function joinQueue(id,name){const q=getQueue().filter(x=>x.id!==id);q.push({id,name,joined:Date.now()});lsS('demo_queue',q);}
function leaveQueueById(id){lsS('demo_queue',getQueue().filter(x=>x.id!==id));}
function queuePos(id){return getQueue().findIndex(x=>x.id===id)+1;}

// ═══ DEMO DATA ═════════════════════════════════════════════════════
function buildDemoData(did){
  const p='d'+did+'_';
  const data={
    project:{id:p+'proj',name:'Edificio Residencial Los Alamos (Demo)',description:'Proyecto demo — 8 pisos en Miraflores',admin_id:'demo_'+did,start_date:addD(TODAY,-30),end_date:addD(TODAY,180)},

const DB={
  async login(email,pass){
    if(email===SUPER.email&&pass===SUPER.password)return SUPER;
    if(sb){
      const{data:a}=await sb.from('admins').select('*').eq('email',email).eq('password',pass);
      if(a&&a.length)return{...a[0],role:'admin'};
      const{data:u}=await sb.from('users').select('*').eq('email',email).eq('password',pass);
      if(u&&u.length)return{...u[0],role:'user'};return null;
    }
    const a=lsG('admins',[]).find(x=>x.email===email&&x.password===pass);if(a)return{...a,role:'admin'};
    const u=lsG('users',[]).find(x=>x.email===email&&x.password===pass);if(u)return{...u,role:'user'};
    return null;
  },
  async registerUser(name,email,pass){
    const nu={id:uid('u'),name,email,password:pass,role:'user',admin_id:null,status:'pending'};
    if(sb){const{data:ex}=await sb.from('users').select('id').eq('email',email);if(ex&&ex.length)return{error:'Email ya registrado'};await sb.from('users').insert(nu);}
    else{if(lsG('users',[]).find(x=>x.email===email))return{error:'Email ya registrado'};lsUp('users',nu);}
    return{ok:true};
  },
  async getAdmins(){if(sb){const{data}=await sb.from('admins').select('*');return data||[];}return lsG('admins',[]);},
  async saveAdmin(r){if(sb)await sb.from('admins').upsert(r);else lsUp('admins',r);},
  async delAdmin(id){if(sb)await sb.from('admins').delete().eq('id',id);else lsDel('admins',id);},
  async getUsers(aid){if(sb){const{data}=await sb.from('users').select('*').eq('admin_id',aid);return data||[];}return lsG('users',[]).filter(u=>u.admin_id===aid);},
  async getAllUsers(){if(sb){const{data}=await sb.from('users').select('*');return data||[];}return lsG('users',[]);},
  async saveUser(r){if(sb)await sb.from('users').upsert(r);else lsUp('users',r);},
  async delUser(id){if(sb)await sb.from('users').delete().eq('id',id);else lsDel('users',id);},
  async getProjects(aid){if(sb){const{data}=await sb.from('projects').select('*').eq('admin_id',aid);return data||[];}return lsG('projects',[]).filter(p=>p.admin_id===aid);},
  async getAllProjects(){if(sb){const{data}=await sb.from('projects').select('*');return data||[];}return lsG('projects',[]);},
  async saveProject(r){if(sb)await sb.from('projects').upsert(r);else lsUp('projects',r);},
  async getStages(pid){if(sb){const{data}=await sb.from('stages').select('*').eq('project_id',pid).order('order_num');return data||[];}return lsG('stages',[]).filter(s=>s.project_id===pid).sort((a,b)=>a.order_num-b.order_num);},
  async saveStage(r){if(sb)await sb.from('stages').upsert(r);else lsUp('stages',r);},
  async getActivities(sid){if(sb){const{data}=await sb.from('activities').select('*').eq('stage_id',sid);return data||[];}return lsG('activities',[]).filter(a=>a.stage_id===sid);},
  async saveActivity(r){if(sb)await sb.from('activities').upsert(r);else lsUp('activities',r);},
  async getTasks(aid){if(sb){const{data}=await sb.from('tasks').select('*').eq('activity_id',aid);return data||[];}return lsG('tasks',[]).filter(t=>t.activity_id===aid);},
  async getTask(id){if(sb){const{data}=await sb.from('tasks').select('*').eq('id',id).single();return data;}return lsG('tasks',[]).find(t=>t.id===id);},
  async updateTask(id,p){if(sb)await sb.from('tasks').update(p).eq('id',id);else lsPatch('tasks',id,p);},
  async saveTask(r){if(sb)await sb.from('tasks').upsert(r);else lsUp('tasks',r);},

function toast(msg,type='ok'){
  const el=document.getElementById('toast');
  el.textContent=(type==='err'?'\u2715 ':'\u2713 ')+msg;
  el.style.background=type==='err'?'#ef4444':'#22c55e';
  el.style.color='#fff';el.style.display='block';
  clearTimeout(el._t);el._t=setTimeout(()=>el.style.display='none',3800);
}

function launchDemoSession(did,name){
  SESSION={id:'demo_'+did,name:name+' (Demo)',email:'demo@teamprojects.io',role:'admin',admin_id:'demo_'+did,demoId:did};
  IS_DEMO=true;DEMO_START=Date.now();

function startDemoTimer(){
  const bar=document.getElementById('demo-bar');
  const fill=document.getElementById('demo-fill');
  const banner=document.getElementById('demo-banner');
  const sbInfo=document.getElementById('demo-sb-info');
  const sbTxt=document.getElementById('demo-timer-txt');
  bar.style.display='block';sbInfo.style.display='block';
  clearInterval(DEMO_IV);
  DEMO_IV=setInterval(()=>{
    const elapsed=Date.now()-DEMO_START;
    const rem=DEMO_MS-elapsed;
    const pct=Math.max(0,(rem/DEMO_MS)*100);
    fill.style.width=pct+'%';
    const m=Math.floor(rem/60000),s=Math.floor((rem%60000)/1000);
    const ts=m>0?`${m}m ${s}s`:`${s}s`;
    if(sbTxt)sbTxt.textContent=ts+' restantes';
    if(rem<=0){
      clearInterval(DEMO_IV);
      openModal(`<div style="text-align:center;padding:10px 0">
        <div style="font-size:48px;margin-bottom:16px">\u23F0</div>
        <div style="font-weight:700;font-size:18px;margin-bottom:10px">Sesion demo finalizada</div>
        <div style="font-size:13px;color:var(--tx2);line-height:1.7;margin-bottom:20px">Tus 2 horas de prueba terminaron.<br><strong style="color:var(--rd)">Los datos de esta sesion se eliminaran.</strong><br><br>Te gusto? Crea una cuenta o contacta a Angeles Group.</div>
        <button class="btn btn-p" style="width:100%;justify-content:center" onclick="closeModal();doLogout()">Volver al inicio</button>
      </div>`);
      releaseSlot(SESSION.demoId);return;
    }
    if(rem<=15*60*1000&&rem>14.9*60*1000){banner.style.display='block';banner.textContent='\u26A0 Tu sesion demo expira en '+m+' minutos. Los datos se eliminaran al cerrar.';setTimeout(()=>banner.style.display='none',12000);}
    if(rem<=5*60*1000&&rem>4.9*60*1000){banner.style.display='block';banner.textContent='\u{1F6A8} Solo quedan '+m+' minutos! Haz capturas si deseas conservar algo.';}
    refreshSlot(SESSION.demoId);
  },1000);
}

function showQueueBox(did,name){
  const box=document.getElementById('queue-box');box.style.display='block';
  renderQueueBox(did);
  QUEUE_IV=setInterval(()=>{
    cleanSlots();
    if(countSlots()<MAX_SLOTS){
      const pos=queuePos(did);
      if(pos===1){
        clearInterval(QUEUE_IV);leaveQueueById(did);
        box.style.display='none';MY_QID=null;
        if(claimSlot(did,name)){launchDemoSession(did,name);toast('\u1F680 Tu turno llego! Sesion demo iniciada');}
        return;
      }
    }
    renderQueueBox(did);
  },3000);
}

function renderQueueBox(did){
  const pos=queuePos(did);
  const msg=document.getElementById('queue-msg');
  const eta=document.getElementById('queue-eta');
  if(!msg)return;
  if(pos===0){leaveQueue();return;}
  msg.textContent='Estas en la posicion #'+pos+' de la cola';
  const slots=getSlots();
  const now=Date.now();
  const minExp=slots.length?Math.min(...slots.map(s=>s.exp-now)):0;
  const etaM=Math.max(0,Math.ceil(minExp/60000));
  eta.textContent='Tiempo estimado de espera: ~'+etaM+' minuto'+(etaM!==1?'s':'');
  const q=getQueue().find(x=>x.id===did);
  const waited=q?now-q.joined:0;
  const prog=document.getElementById('queue-prog');
  if(prog)prog.style.width=Math.min(100,(waited/(DEMO_MS))*100)+'%';
}

function leaveQueue(){
  if(MY_QID){leaveQueueById(MY_QID);MY_QID=null;}
  clearInterval(QUEUE_IV);
  document.getElementById('queue-box').style.display='none';
}

async function startApp(){
  document.getElementById('page-login').style.display='none';
  document.getElementById('page-app').style.display='block';
  updateSBUser();
  await buildSidebar();
  await loadNotifs();
  if(sb&&!IS_DEMO){
    sb.channel('live')
      .on('postgres_changes',{event:'*',schema:'public',table:'tasks'},()=>{if(currentView==='tasks')refreshTaskRows();else if(currentView==='dashboard')showView('dashboard');})
      .on('postgres_changes',{event:'INSERT',schema:'public',table:'notifications'},loadNotifs)
      .subscribe();
  }
  if(!IS_DEMO)setInterval(loadNotifs,20000);
  if(SESSION.role==='user')showView('tasks');
  else if(SESSION.role==='superadmin')showView('dashboard');
  else{
    const projs=await DDB.getProjects();
    if(projs.length){SEL_PROJ=projs[0].id;showView('dashboard');}

function updateSBUser(){

async function buildSidebar(){

    html+=`<div class="ns">SUPER ADMIN</div>
    <div class="ni" data-v="dashboard" onclick="showView('dashboard')">&#x1F4CA; <span>Dashboard</span></div>
    <div class="ni" data-v="admins" onclick="showView('admins')">&#x1F3E2; <span>Administradores</span></div>

  }
  if(isAdmin){
    html+=`<div class="ns">PROYECTOS</div>`;
    const projs=await DDB.getProjects();
    projs.forEach(p=>{
      const nm=p.name.length>21?p.name.slice(0,21)+'\u2026':p.name;
      html+=`<div class="ni" data-proj="${p.id}" onclick="selectProj('${p.id}')">&#x1F3D7; <span title="${esc(p.name)}">${esc(nm)}</span></div>`;
    });
    if(!IS_DEMO)html+=`<div class="ni" data-v="newproject" onclick="showView('newproject')">&#xFF0B; <span>Nuevo Proyecto</span></div>`;

    html+=`<div class="ns">MI TRABAJO</div>
    <div class="ni" data-v="tasks" onclick="showView('tasks')">&#x2705; <span>Mis Tareas</span></div>`;
  }

    html+=`<div class="ns">GESTION</div>
    <div class="ni" data-v="dashboard" onclick="showView('dashboard')">&#x1F4CA; <span>Dashboard</span></div>
    <div class="ni" data-v="gantt" onclick="showView('gantt')">&#x1F4D0; <span>Gantt</span></div>
    <div class="ni" data-v="tasks" onclick="showView('tasks')">&#x2705; <span>Tareas</span></div>
    <div class="ni" data-v="team" onclick="showView('team')">&#x1F465; <span>Equipo</span></div>
    <div class="ni" data-v="stages" onclick="showView('stages')">&#x1F4CB; <span>Estructura</span></div>`;
  }
  nav.innerHTML=html;markActiveNav();
}

function markActiveNav(){
  document.querySelectorAll('.ni').forEach(el=>{
    el.classList.remove('act');
    const v=el.dataset.v,p=el.dataset.proj;
    if(v&&v===currentView)el.classList.add('act');
    if(p&&p===SEL_PROJ&&['dashboard','tasks','gantt','team','stages'].includes(currentView))el.classList.add('act');
  });
}

async function selectProj(id){SEL_PROJ=id;OPEN_STAGES={};OPEN_ACTS={};TASK_FILTER='mine';await buildSidebar();showView('dashboard');}

// ═══ VIEW ROUTER ════════════════════════════════════════════════════
async function showView(v){
  currentView=v;markActiveNav();
  const el=document.getElementById('view-content');
  el.innerHTML=`<div style="display:flex;align-items:center;justify-content:center;padding:80px 0;gap:12px;color:var(--tx3)"><div style="width:20px;height:20px;border:2px solid var(--bd2);border-top:2px solid var(--ac);border-radius:50%;animation:spin .8s linear infinite"></div><span>Cargando...</span></div>`;
  el.className='';
  try{const html=await views[v]();el.innerHTML=html;el.className='fade';if(views[v+'_init'])views[v+'_init']();}
  catch(e){el.innerHTML=`<div style="color:var(--rd);padding:20px">Error: ${esc(e.message)}</div>`;console.error(e);}
}

// ═══ NOTIFICATIONS ══════════════════════════════════════════════════
async function loadNotifs(){
  if(IS_DEMO)return;
  NOTIFS=await DB.getNotifs();
  const mine=NOTIFS.filter(n=>{const t=n.to_users||[];return t.length===0||t.includes(SESSION.id);});
  const unread=mine.filter(n=>!(n.read_by||[]).includes(SESSION.id)).length;
  const badge=document.getElementById('nb');
  if(badge){if(unread>0){badge.textContent=unread;badge.style.display='flex';}else badge.style.display='none';}
  const el=document.getElementById('notif-list');if(!el)return;
  if(!mine.length){el.innerHTML='<div style="padding:24px;text-align:center;color:var(--tx3);font-size:12px">Sin notificaciones</div>';return;}
  el.innerHTML=mine.slice(0,20).map(n=>{
    const read=(n.read_by||[]).includes(SESSION.id);
    return`<div onclick="readNotif(${n.id})" style="padding:10px 16px;border-bottom:1px solid var(--bd);background:${read?'transparent':'rgba(245,158,11,.04)'};cursor:pointer">
      <div style="font-size:12px;line-height:1.4">${esc(n.message)}</div>
      <div style="font-size:10px;color:var(--tx3);margin-top:3px">${new Date(n.created_at).toLocaleString('es-PE',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}</div>
    </div>`;
  }).join('');
}
async function readNotif(id){await DB.markRead(id);await loadNotifs();}
async function markAllRead(){for(const n of NOTIFS)await DB.markRead(n.id);await loadNotifs();}
function toggleNotifs(){const p=document.getElementById('notif-panel');p.style.display=p.style.display==='none'?'block':'none';}
async function addNotif(msg,toU=[]){if(IS_DEMO)return;await DB.addNotif(msg,toU);await loadNotifs();}

// ═══ HELPERS ════════════════════════════════════════════════════════
function hdr(t,s=''){return`<div style="margin-bottom:22px"><div style="font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--ac);letter-spacing:1px">${t}</div>${s?`<div style="color:var(--tx2);font-size:13px;margin-top:1px">${esc(s)}</div>`:''}</div>`;}
function avH(n,sz=32){return`<div class="av" style="width:${sz}px;height:${sz}px;font-size:${Math.round(sz*.37)}px">${ini(n)}</div>`;}
function pbH(pct,col='var(--ac)'){return`<div class="pb"><div class="pf" style="width:${pct}%;background:${col}"></div></div>`;}
function kpiCard(ic,lb,val,sub,col){return`<div class="card" style="position:relative;overflow:hidden;border:1px solid var(--bd2)"><div style="position:absolute;top:-10px;right:-10px;font-size:56px;opacity:.05">${ic}</div><div style="font-size:22px;margin-bottom:4px">${ic}</div><div style="font-size:28px;font-weight:700;color:${col};font-family:'JetBrains Mono',monospace">${val}</div><div style="font-size:12px;font-weight:600;margin-top:2px">${lb}</div><div style="font-size:11px;color:var(--tx3);margin-top:1px">${sub}</div></div>`;}

// ═══ STARS — INLINE UPDATE (FIX #4) ════════════════════════════════
async function updateStar(taskId,stars){
  const task=await DDB.getTask(taskId);if(!task){toast('Tarea no encontrada','err');return;}
  if(getEv(task).length>0||task.stars===5){toast('Las 5 estrellas se activan al subir evidencia','err');return;}
  if(stars===5){toast('Sube evidencia para completar al 100%','err');return;}
  const canAdmin=SESSION.role==='admin'||SESSION.role==='superadmin';
  if(!canAdmin&&task.responsible_id!==SESSION.id){toast('Solo el responsable puede actualizar','err');return;}
  await DDB.updateTask(taskId,{stars});
  // Update only the DOM row — no full reload
  updateTaskRowDOM(taskId,{...task,stars});
  if(!IS_DEMO)await addNotif(`&#x1F4CA; "${task.name}" \u2192 ${s2p(stars)}% \u2014 ${SESSION.name}`);
  toast(`Avance: ${s2p(stars)}%`);
}

function updateTaskRowDOM(taskId,task){
  const row=document.getElementById('tr-'+taskId);if(!row)return;
  const canAdmin=SESSION.role==='admin'||SESSION.role==='superadmin';
  const canAct=canAdmin||task.responsible_id===SESSION.id;
  // Stars
  const starRow=row.querySelector('.star-row');
  if(starRow)starRow.innerHTML=[1,2,3,4,5].map(n=>{
    const filled=n<=task.stars,locked=n===5||!canAct;
    return`<span class="si${locked?' lk':''}" style="color:${filled?'var(--ac)':'var(--bd2)'}"${!locked?` onclick="updateStar('${taskId}',${n})" onmouseenter="this.style.transform='scale(1.3)'" onmouseleave="this.style.transform='scale(1)'"`:''}>&#9733;</span>`;
  }).join('');
  const pctEl=row.querySelector('.star-pct');
  if(pctEl)pctEl.textContent=s2p(task.stars)+'%';
  const st=calcSt(task);
  const stEl=row.querySelector('.st-badge');
  if(stEl){stEl.className='badge st-badge '+st.cls;stEl.innerHTML=st.icon+' '+st.label;}
  updateStagePctDOM(task.activity_id);
}

async function updateStagePctDOM(actId){
  if(!SEL_PROJ)return;
  const stages=await DDB.getStages(SEL_PROJ);
  for(const s of stages){
    const acts=await DDB.getActivities(s.id);
    if(!acts.some(a=>a.id===actId))continue;
    let tot=0,sum=0;
    for(const a of acts){const t=await DDB.getTasks(a.id);t.forEach(x=>{tot++;sum+=s2p(x.stars);});}
    const pct=tot?Math.round(sum/tot):0;
    const pe=document.getElementById('spct-'+s.id);const be=document.getElementById('sbar-'+s.id);
    if(pe)pe.textContent=pct+'%';if(be)be.style.width=pct+'%';break;
  }
}

async function refreshTaskRows(){
  // Reload all task rows in place without closing accordions
  if(!SEL_PROJ)return;
  const stages=await DDB.getStages(SEL_PROJ);
  for(const s of stages){
    const acts=await DDB.getActivities(s.id);
    for(const a of acts){
      const tasks=await DDB.getTasks(a.id);
      for(const task of tasks){updateTaskRowDOM(task.id,task);}
    }
  }
}

<script>
const views={

// ── DASHBOARD ─────────────────────────────────────────────────────
async dashboard(){
  if(!SEL_PROJ)return`<div style="text-align:center;padding:80px 0;color:var(--tx3)"><div style="font-size:52px;margin-bottom:16px">&#x1F3D7;</div><div style="font-size:16px;font-weight:600;color:var(--tx2)">Selecciona o crea un proyecto</div></div>`;
  const allP=await DDB.getAllProjects();const proj=allP.find(p=>p.id===SEL_PROJ);
  if(!proj)return'';
  const stages=await DDB.getStages(proj.id);
  const allActs=[];for(const s of stages){const a=await DDB.getActivities(s.id);allActs.push(...a);}
  const allT=[];for(const a of allActs){const t=await DDB.getTasks(a.id);allT.push(...t);}
  const allU=await DDB.getAllUsers();
  const total=allT.length,done=allT.filter(t=>t.stars===5||getEv(t).length>0).length;
  const inProg=allT.filter(t=>t.stars>0&&t.stars<5&&!getEv(t).length).length;
  const overPct=total?Math.round(allT.reduce((a,t)=>a+s2p(t.stars),0)/total):0;
  const totalD=diffD(proj.start_date,proj.end_date),elapsed=diffD(proj.start_date,fmtISO(TODAY));
  const timePct=Math.min(100,Math.round(elapsed/Math.max(1,totalD)*100));
  const overdue=allT.filter(t=>calcSt(t).label.includes('fuera')).length;
  let stRows='';
  for(let i=0;i<stages.length;i++){
    const sA=allActs.filter(a=>a.stage_id===stages[i].id);
    const sT=allT.filter(t=>sA.some(a=>a.id===t.activity_id));

    stRows+=`<div style="margin-bottom:14px"><div style="display:flex;justify-content:space-between;margin-bottom:5px"><span style="font-size:12px;font-weight:600">${esc(stages[i].name)}</span><span style="font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--ac);font-weight:700">${pct}%</span></div>${pbH(pct,COLS[i%COLS.length])}<div style="font-size:10px;color:var(--tx3);margin-top:2px">${sT.length} tareas &bull; ${sT.filter(t=>t.stars===5).length} ejecutadas</div></div>`;
  }
  const projU=allU.filter(u=>allT.some(t=>t.responsible_id===u.id));
  let uRows=projU.map((u,i)=>{const myT=allT.filter(t=>t.responsible_id===u.id);const pct=Math.round(myT.reduce((a,t)=>a+s2p(t.stars),0)/myT.length);return`<div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">${avH(u.name,32)}<div style="flex:1"><div style="display:flex;justify-content:space-between;margin-bottom:5px"><span style="font-size:12px;font-weight:600">${esc(u.name)}</span><span style="font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--ac);font-weight:700">${pct}%</span></div>${pbH(pct,COLS[i%COLS.length])}<div style="font-size:10px;color:var(--tx3);margin-top:2px">${myT.filter(t=>t.stars===5).length}/${myT.length} completadas</div></div></div>`;}).join('');
  const sts=[{l:'No iniciado',c:'var(--tx3)',v:allT.filter(t=>calcSt(t).label.startsWith('No iniciado')&&!calcSt(t).label.includes('fuera')).length},{l:'Fuera de plazo',c:'var(--rd)',v:allT.filter(t=>calcSt(t).label.includes('fuera')).length},{l:'En proceso',c:'var(--bl)',v:allT.filter(t=>calcSt(t).label.startsWith('En proceso')).length},{l:'Ejecutado',c:'var(--gn)',v:allT.filter(t=>calcSt(t).label.startsWith('Ejecutado')).length}];
  return hdr('DASHBOARD DEL PROYECTO',proj.name)+`
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px">
    ${kpiCard('&#x1F4C8;','Avance General',overPct+'%',done+'/'+total+' completadas','var(--ac)')}
    ${kpiCard('&#x23F1;','Tiempo',timePct+'%',elapsed+'/'+totalD+' dias','var(--bl)')}
    ${kpiCard('&#x2705;','Ejecutadas',done,inProg+' en proceso','var(--gn)')}
    ${kpiCard('&#x26A0;','Fuera de Plazo',overdue,'tareas vencidas','var(--rd)')}
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
    <div class="card"><div style="font-weight:700;margin-bottom:16px;font-size:13px">&#x1F4CA; Avance por Etapa</div>${stRows}</div>
    <div class="card"><div style="font-weight:700;margin-bottom:16px;font-size:13px">&#x1F465; Por Responsable</div>${uRows||'<div style="color:var(--tx3);font-size:12px">Sin responsables asignados</div>'}</div>
  </div>
  <div class="card"><div style="font-weight:700;margin-bottom:14px;font-size:13px">&#x1F4CB; Estados</div><div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px">${sts.map(s=>`<div style="text-align:center;padding:16px 10px;background:var(--sf2);border-radius:10px"><div style="font-size:30px;font-weight:700;color:${s.c};font-family:'JetBrains Mono',monospace">${s.v}</div><div style="font-size:11px;color:var(--tx2);margin-top:4px">${s.l}</div></div>`).join('')}</div></div>`;
},

// ── TASKS ─────────────────────────────────────────────────────────
async tasks(){
  const canAdmin=SESSION.role==='admin'||SESSION.role==='superadmin';
  let proj=null;
  if(SEL_PROJ){const all=await DDB.getAllProjects();proj=all.find(p=>p.id===SEL_PROJ);}
  if(!proj&&SESSION.role==='user'){
    const allP=await DDB.getAllProjects();
    for(const p of allP){const ss=await DDB.getStages(p.id);for(const s of ss){const aa=await DDB.getActivities(s.id);for(const a of aa){const tt=await DDB.getTasks(a.id);if(tt.some(t=>t.responsible_id===SESSION.id)){proj=p;SEL_PROJ=p.id;break;}}if(proj)break;}if(proj)break;}
  }
  if(!proj)return`<div style="text-align:center;padding:80px 0;color:var(--tx3)"><div style="font-size:52px">&#x1F3D7;</div><div style="font-size:16px;font-weight:600;color:var(--tx2);margin-top:16px">Sin proyecto seleccionado</div></div>`;
  const stages=await DDB.getStages(proj.id);
  const allU=await DDB.getAllUsers();const getU=id=>allU.find(u=>u.id===id)||{name:'Sin asignar'};

  // Gather all users that have tasks
  let tuIds=new Set();
  for(const s of stages){const aa=await DDB.getActivities(s.id);for(const a of aa){const tt=await DDB.getTasks(a.id);tt.forEach(t=>tuIds.add(t.responsible_id));}}
  const taskUsers=allU.filter(u=>tuIds.has(u.id));

  // Filter bar
  const fBar=`<div style="display:flex;align-items:center;gap:8px;padding:10px 16px;background:var(--sf2);border:1px solid var(--bd2);border-radius:10px;margin-bottom:16px;flex-wrap:wrap">
    <span style="font-size:12px;font-weight:600;color:var(--tx2)">&#x1F50D; Filtrar:</span>
    ${SESSION.role==='user'?`
      <button class="tab ${TASK_FILTER==='mine'?'act':''}" onclick="setFilter('mine')">Mis tareas</button>
      <button class="tab ${TASK_FILTER==='all'?'act':''}" onclick="setFilter('all')">Ver todas (solo lectura)</button>
    `:`
      <button class="tab ${TASK_FILTER==='all'?'act':''}" onclick="setFilter('all')">Todas</button>
      ${taskUsers.map(u=>`<button class="tab ${TASK_FILTER===u.id?'act':''}" onclick="setFilter('${u.id}')">${esc(u.name.split(' ')[0])}</button>`).join('')}
    `}
  </div>`;

  let html=hdr('CONTROL DE TAREAS',proj.name+' &bull; '+fmtD(proj.start_date)+' &rarr; '+fmtD(proj.end_date))+fBar;

  for(let si=0;si<stages.length;si++){
    const s=stages[si];
    const acts=await DDB.getActivities(s.id);
    let stageTot=0,stageSum=0;let actsHTML='';

    for(let ai=0;ai<acts.length;ai++){
      const a=acts[ai];
      let tasks=await DDB.getTasks(a.id);
      // Apply filter
      let isReadOnly=false;
      if(TASK_FILTER==='mine')tasks=tasks.filter(t=>t.responsible_id===SESSION.id);
      else if(TASK_FILTER!=='all'){tasks=tasks.filter(t=>t.responsible_id===TASK_FILTER);isReadOnly=(SESSION.role==='user');}
      else if(SESSION.role==='user')isReadOnly=true; // user sees all but can't edit others
      if(!tasks.length)continue;

      stageTot+=tasks.length;stageSum+=tasks.reduce((acc,t)=>acc+s2p(t.stars),0);
      let rows='';
      tasks.forEach(task=>{
        const u=getU(task.responsible_id);
        const days=diffD(task.start_date,task.end_date);

        }).join('');

        rows+=`<tr id="tr-${task.id}">
          <td><div style="font-weight:600;font-size:12px">${esc(task.name)}</div>
            ${task.rescheduled>0?`<div style="font-size:10px;color:var(--ac)">&#x1F504; Reprog. ${task.rescheduled}&times;</div>`:''}
            ${task.reschedule_pending?`<div style="font-size:10px;color:var(--rd)">&#x23F3; Pendiente aprobacion</div>`:''}
            ${histChip}
          </td>
          <td><div style="display:flex;align-items:center;gap:7px">${avH(u.name,26)}<span style="font-size:12px">${esc(u.name)}</span>${isReadOnly&&TASK_FILTER==='all'?'<span class="badge b-gray" style="font-size:9px">solo lectura</span>':''}</div></td>
          <td><span style="font-size:11px;font-family:'JetBrains Mono',monospace">${fmtD(task.start_date)}</span></td>
          <td><span style="font-size:11px;font-family:'JetBrains Mono',monospace">${fmtD(task.end_date)}</span></td>
          <td><span style="font-size:12px;font-weight:700;font-family:'JetBrains Mono',monospace">${days}d</span></td>
          <td>
            <div class="star-row">${stars}</div>
            <div class="star-pct" style="font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--ac);font-weight:700">${s2p(task.stars)}%</div>
          </td>
          <td><span class="badge st-badge ${st.cls}">${st.icon} ${st.label}</span></td>
          <td>${ev.length?`<button class="badge b-green" style="cursor:pointer" onclick="viewEvidence('${task.id}')">&#x1F4CE; ${ev.length}</button>`:canAct?`<button class="btn btn-g btn-s" onclick="uploadEvidence('${task.id}')">&#x2191; Subir</button>`:'&mdash;'}</td>
          <td>
            ${canAct&&(task.rescheduled||0)<3&&!task.reschedule_pending?`<button class="btn btn-g btn-s" onclick="openReschedule('${task.id}')">&#x1F504;</button>`:''}
            ${canAdmin&&task.reschedule_pending?`<button class="btn btn-p btn-s" onclick="approveReschedule('${task.id}')">&#x2713; OK</button>`:''}
          </td>
        </tr>`;
      });

      const isOpenAct=OPEN_ACTS[a.id]!==false;
      actsHTML+=`<div style="margin-bottom:6px">
        <div style="display:flex;align-items:center;gap:10px;padding:9px 16px;background:var(--sf);border:1px solid var(--bd);border-radius:8px;cursor:pointer;margin-bottom:4px" onclick="toggleAct('ab-${a.id}',this)">
          <span style="font-size:11px;color:var(--tx3)">${isOpenAct?'&#9660;':'&#9654;'}</span>
          <span style="font-weight:600;font-size:13px;flex:1">Act. ${si+1}.${ai+1}: ${esc(a.name)}</span>
          <span style="font-size:11px;color:var(--tx3)">${tasks.length} tareas</span>
        </div>
        <div id="ab-${a.id}" style="display:${isOpenAct?'block':'none'};background:var(--sf);border:1px solid var(--bd);border-radius:8px;overflow:hidden;margin-bottom:2px">

      <div style="display:flex;align-items:center;gap:12px;padding:12px 18px;background:var(--sf2);border:1px solid var(--bd2);border-radius:10px;cursor:pointer;margin-bottom:${isOpenStage&&actsHTML?'6px':'0'}" onclick="toggleStage('sb-${s.id}',this)">

          <span id="spct-${s.id}" style="font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--ac);font-weight:700">${sPct}%</span>

// ── GANTT ─────────────────────────────────────────────────────────
async gantt(){
  if(!SEL_PROJ)return'<div style="color:var(--tx3);padding:40px">Sin proyecto seleccionado</div>';
  const allP=await DDB.getAllProjects();const proj=allP.find(p=>p.id===SEL_PROJ);if(!proj)return'';
  const stages=await DDB.getStages(proj.id);const allT=[];const stData=[];
  for(const s of stages){const aa=await DDB.getActivities(s.id);const aD=[];for(const a of aa){const tt=await DDB.getTasks(a.id);aD.push({...a,tasks:tt});allT.push(...tt);}stData.push({...s,activities:aD});}
  if(!allT.length)return hdr('DIAGRAMA GANTT',proj.name)+'<div style="padding:40px;text-align:center;color:var(--tx3)">Sin tareas aun</div>';
  const dates=allT.flatMap(t=>[new Date(t.start_date),new Date(t.end_date)]);
  const minD=new Date(Math.min(...dates));const span=diffD(fmtISO(minD),fmtISO(new Date(Math.max(...dates))))+14;
  const tOff=diffD(fmtISO(minD),fmtISO(TODAY));
  const L=t=>(diffD(fmtISO(minD),t.start_date)/span)*100;
  const W=t=>Math.max(.8,(diffD(t.start_date,t.end_date)/span)*100);
  let rows='';
  stData.forEach(stage=>{
    rows+=`<div style="display:flex;align-items:center;margin-bottom:4px"><div style="width:260px;flex-shrink:0;font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:1px;color:var(--ac);padding-right:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(stage.name)}</div><div style="flex:1;height:6px;background:var(--sf2);border-radius:4px;position:relative"><div style="position:absolute;left:${(tOff/span)*100}%;top:-4px;bottom:-4px;width:1px;background:var(--rd);opacity:.3"></div></div></div>`;
    stage.activities.forEach(a=>a.tasks.forEach(task=>{
      const st=calcSt(task);const bc=st.cls==='b-green'?'#22c55e':st.cls==='b-red'?'#ef4444':st.cls==='b-blue'?'#3b82f6':st.cls==='b-amber'?'#f59e0b':'#4a5568';const pct=s2p(task.stars);
      rows+=`<div style="display:flex;align-items:center;margin-bottom:4px"><div style="width:260px;flex-shrink:0;font-size:11px;color:var(--tx2);padding:0 12px 0 16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${esc(task.name)}">&bull; ${esc(task.name)}</div>
        <div style="flex:1;position:relative;height:22px"><div style="position:absolute;left:${(tOff/span)*100}%;top:0;bottom:0;width:1px;background:var(--rd);opacity:.2"></div>
          <div style="position:absolute;left:${L(task)}%;width:${W(task)}%;height:22px;background:${bc}16;border:1px solid ${bc}40;border-radius:4px;top:0;display:flex;align-items:center;padding:0 7px;overflow:hidden" title="${esc(task.name)} &bull; ${pct}%" onmouseenter="this.style.filter='brightness(1.4)'" onmouseleave="this.style.filter='none'">
            ${pct>0?`<div style="position:absolute;left:0;top:0;bottom:0;width:${pct}%;background:${bc}30;border-radius:3px"></div>`:''}
            <span style="position:relative;z-index:1;font-size:10px;font-weight:700;color:${bc};white-space:nowrap">${pct}%</span>
          </div>
        </div>
      </div>`;
    }));
  });
  return hdr('DIAGRAMA GANTT',proj.name)+`<div class="card" style="overflow-x:auto;padding:0"><div style="min-width:1000px;padding:20px">
    <div style="position:relative;height:28px;margin-bottom:6px;margin-left:260px;border-bottom:1px solid var(--bd)">
      <div style="position:absolute;left:${(tOff/span)*100}%;top:0;bottom:0;width:2px;background:var(--rd);opacity:.8"></div>
      <div style="position:absolute;left:${(tOff/span)*100}%;top:2px;background:var(--rd);color:#fff;font-size:10px;padding:2px 8px;border-radius:4px;transform:translateX(-50%);white-space:nowrap;font-weight:700">HOY</div>
    </div>
    ${rows}
    <div style="display:flex;gap:14px;margin-top:18px;padding-top:14px;border-top:1px solid var(--bd);flex-wrap:wrap">
      ${[['#22c55e','Ejecutado en plazo'],['#f59e0b','Fuera de plazo'],['#3b82f6','En proceso'],['#ef4444','Vencido'],['#4a5568','No iniciado']].map(([c,l])=>`<div style="display:flex;align-items:center;gap:6px;font-size:11px;color:var(--tx2)"><div style="width:12px;height:12px;background:${c};border-radius:3px;opacity:.7"></div>${l}</div>`).join('')}
    </div>
  </div></div>`;
},

<script>

function toggleStage(id,hdrEl){

// ═══ EVIDENCE ═══════════════════════════════════════════════════
async function uploadEvidence(taskId){
  openModal(`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px"><div style="font-weight:700;font-size:16px">&#x1F4CE; Subir Evidencia</div><button class="btn btn-g btn-s" onclick="closeModal()">&#x2715;</button></div>
    <div style="border:2px dashed var(--bd2);border-radius:10px;padding:30px 20px;text-align:center;cursor:pointer;margin-bottom:14px" onmouseenter="this.style.borderColor='var(--ac)'" onmouseleave="this.style.borderColor='var(--bd2)'" onclick="document.getElementById('ev-f').click()">
      <div style="font-size:34px;margin-bottom:8px">&#x2191;</div>
      <div style="font-weight:600;font-size:13px">Haz clic para seleccionar archivos</div>
      <div style="font-size:11px;color:var(--tx3);margin-top:4px">Fotos, PDF, Word, Videos</div>
      <div style="font-size:11px;color:var(--ac);margin-top:8px;font-weight:600">&#x2B50; Al cargar evidencia la tarea se marca automaticamente al 100%</div>
    </div>
    <input type="file" id="ev-f" multiple accept="image/*,.pdf,.doc,.docx,video/*" style="display:none" onchange="processEvidence('${taskId}',this.files)">
    <button class="btn btn-g" style="width:100%;justify-content:center" onclick="closeModal()">Cancelar</button>`);
}

async function processEvidence(taskId,files){
  if(!files||!files.length)return;
  const task=await DDB.getTask(taskId);if(!task)return;
  const cur=getEv(task);
  const newEvs=Array.from(files).map(f=>({name:f.name,type:f.type.startsWith('image')?'image':f.type==='application/pdf'?'pdf':f.type.startsWith('video')?'video':'doc'}));
  await DDB.updateTask(taskId,{evidence:JSON.stringify([...cur,...newEvs]),stars:5});
  updateTaskRowDOM(taskId,{...task,evidence:JSON.stringify([...cur,...newEvs]),stars:5});
  if(!IS_DEMO)await addNotif(`&#x1F4CE; Evidencia en "${task.name}" por ${SESSION.name} &#x2014; 100%!`);
  toast('Evidencia cargada &#x2014; Tarea al 100%');closeModal();
}

async function viewEvidence(taskId){
  const task=await DDB.getTask(taskId);if(!task)return;
  const ev=getEv(task);const icons={image:'&#x1F5BC;',pdf:'&#x1F4C4;',video:'&#x1F3AC;',doc:'&#x1F4DD;'};
  openModal(`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px"><div><div style="font-weight:700;font-size:16px">&#x1F4CE; Evidencias</div><div style="font-size:12px;color:var(--tx2);margin-top:3px">${esc(task.name)}</div></div><button class="btn btn-g btn-s" onclick="closeModal()">&#x2715;</button></div>
    ${ev.map(e=>`<div style="display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--sf2);border-radius:8px;margin-bottom:6px"><span style="font-size:22px">${icons[e.type]||'&#x1F4C4;'}</span><span style="font-size:12px;flex:1;word-break:break-all">${esc(e.name)}</span><span class="badge b-green">&#x2713;</span></div>`).join('')}
    <button class="btn btn-g" style="width:100%;justify-content:center;margin-top:8px" onclick="closeModal()">Cerrar</button>`);

// ═══ RESCHEDULE ══════════════════════════════════════════════════
async function openReschedule(taskId){
  const task=await DDB.getTask(taskId);if(!task)return;
  const left=3-(task.rescheduled||0);const canAdmin=SESSION.role==='admin'||SESSION.role==='superadmin';
  openModal(`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px"><div><div style="font-weight:700;font-size:16px">&#x1F504; Reprogramar</div><div style="font-size:12px;color:var(--tx2);margin-top:3px">${esc(task.name)}</div></div><button class="btn btn-g btn-s" onclick="closeModal()">&#x2715;</button></div>
    <div style="background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);border-radius:8px;padding:10px 14px;margin-bottom:16px;font-size:12px;color:var(--ac)">Disponibles: <strong>${left} de 3</strong>${!canAdmin?' &bull; Requiere aprobacion del administrador':''}</div>
    <div class="fg"><label class="lbl">Nueva fecha inicio</label><input class="inp" type="date" id="rs-s" value="${task.start_date}" onchange="updRsDur()"></div>
    <div class="fg"><label class="lbl">Nueva fecha fin</label><input class="inp" type="date" id="rs-e" value="${task.end_date}" onchange="updRsDur()"></div>
    <div id="rs-dur" style="background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.2);border-radius:8px;padding:8px 14px;font-size:12px;color:var(--bl);margin-bottom:14px">&#x1F4C5; Duracion: <strong>${diffD(task.start_date,task.end_date)} dias</strong></div>
    <div class="fg"><label class="lbl">Motivo</label><textarea class="inp" id="rs-r" rows="3" placeholder="Explica el motivo..." style="resize:none"></textarea></div>
    <div style="display:flex;gap:10px;justify-content:flex-end"><button class="btn btn-g" onclick="closeModal()">Cancelar</button><button class="btn btn-p" onclick="confirmReschedule('${taskId}',${canAdmin})">${canAdmin?'Reprogramar':'Solicitar aprobacion'}</button></div>`);
}
function updRsDur(){const s=document.getElementById('rs-s')?.value,e=document.getElementById('rs-e')?.value,d=document.getElementById('rs-dur');if(s&&e&&d)d.innerHTML=`&#x1F4C5; Nueva duracion: <strong>${diffD(s,e)} dias</strong>`;}

async function confirmReschedule(taskId,canAdmin){
  const ns=document.getElementById('rs-s').value,ne=document.getElementById('rs-e').value,reason=document.getElementById('rs-r').value;
  const task=await DDB.getTask(taskId);if(!task)return;
  if((task.rescheduled||0)>=3){toast('Maximo 3 reprogramaciones','err');return;}
  if(canAdmin){
    await DDB.updateTask(taskId,{start_date:ns,end_date:ne,rescheduled:(task.rescheduled||0)+1,reschedule_pending:false});
    if(!IS_DEMO)await addNotif(`&#x1F504; "${task.name}" reprogramada por ${SESSION.name}`);
    toast('Reprogramacion aplicada');
  }else{
    await DDB.updateTask(taskId,{pending_start:ns,pending_end:ne,pending_reason:reason,reschedule_pending:true});
    if(!IS_DEMO)await addNotif(`&#x1F504; Solicitud de reprogramacion: "${task.name}" por ${SESSION.name}`);
    toast('Solicitud enviada al administrador');
  }
  closeModal();showView('tasks');
}

async function approveReschedule(taskId){
  const task=await DDB.getTask(taskId);if(!task)return;
  await DDB.updateTask(taskId,{start_date:task.pending_start,end_date:task.pending_end,rescheduled:(task.rescheduled||0)+1,reschedule_pending:false,pending_start:null,pending_end:null,pending_reason:null});
  if(!IS_DEMO)await addNotif(`&#x2705; Reprogramacion aprobada: "${task.name}"`);
  toast('Reprogramacion aprobada');showView('tasks');
}

// ═══ HISTORY ════════════════════════════════════════════════════
async function viewHistory(taskId){
  const task=await DDB.getTask(taskId);if(!task)return;
  const hist=getHist(task);
  openModal(`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
    <div><div style="font-weight:700;font-size:16px">&#x1F4CB; Historial de Responsables</div><div style="font-size:12px;color:var(--tx2);margin-top:3px">${esc(task.name)}</div></div>
    <button class="btn btn-g btn-s" onclick="closeModal()">&#x2715;</button>
  </div>
  ${hist.length===0?'<div style="color:var(--tx3);text-align:center;padding:20px">Sin historial de cambios</div>':
    hist.map(h=>`<div style="padding:12px 14px;background:var(--sf2);border-radius:8px;margin-bottom:8px;border-left:3px solid var(--pu)">
      <div style="font-size:12px;font-weight:600;color:var(--tx);margin-bottom:4px">${esc(h.prevName)} &#8594; <strong style="color:var(--ac)">${esc(h.newName)}</strong></div>
      <div style="font-size:11px;color:var(--tx2)">Punto de corte: <strong>${fmtD(h.cutoffDate)}</strong></div>
      ${h.reason?`<div style="font-size:11px;color:var(--tx3);margin-top:2px">Motivo: ${esc(h.reason)}</div>`:''}
      <div style="font-size:10px;color:var(--tx3);margin-top:4px">${new Date(h.changedAt).toLocaleString('es-PE',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'})}</div>
    </div>`).join('')}
  <button class="btn btn-g" style="width:100%;justify-content:center;margin-top:8px" onclick="closeModal()">Cerrar</button>`);
}

function updNtDur(){const s=document.getElementById('nt-s')?.value,e=document.getElementById('nt-e')?.value,d=document.getElementById('nt-dur');if(s&&e&&d)d.innerHTML=`&#x23F1; Duracion: <strong>${diffD(s,e)} dias</strong>`;}

// ── EDIT USER — with replacement + cutoff + history (fix #3) ──
async function openEditUser(userId){
  const users=await DDB.getAllUsers();const u=users.find(x=>x.id===userId);if(!u)return;
  openModal(`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px"><div style="font-weight:700;font-size:16px">Editar Usuario</div><button class="btn btn-g btn-s" onclick="closeModal()">&#x2715;</button></div>
    <div class="fg"><label class="lbl">Nombre completo</label><input class="inp" id="eu-n" value="${esc(u.name)}"></div>
    <div class="fg"><label class="lbl">Email</label><input class="inp" type="email" id="eu-e" value="${esc(u.email)}"></div>
    <div style="border-top:1px solid var(--bd);margin:16px 0;padding-top:16px">
      <div style="font-weight:600;font-size:13px;color:var(--tx2);margin-bottom:12px">&#x1F504; Reemplazo de persona</div>
      <div style="background:rgba(168,85,247,.08);border:1px solid rgba(168,85,247,.2);border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:12px;color:var(--pu)">Si actualizas nombre y email con datos de una nueva persona, se registrara un historial en todas las tareas asignadas al responsable actual, con punto de corte en la fecha que indiques.</div>
      <div class="fg"><label class="lbl">Fecha punto de corte &#x1F4C5; (si hay reemplazo)</label><input class="inp" type="date" id="eu-cut" value="${fmtISO(TODAY)}"></div>
      <div class="fg"><label class="lbl">Motivo del reemplazo (opcional)</label><input class="inp" id="eu-reason" placeholder="Ej: Licencia medica, renuncia, etc."></div>
    </div>
    <div style="display:flex;gap:10px;justify-content:flex-end"><button class="btn btn-g" onclick="closeModal()">Cancelar</button><button class="btn btn-p" onclick="saveEditUser('${userId}')">Guardar cambios</button></div>`,520);
}

async function saveEditUser(userId){
  const newName=document.getElementById('eu-n').value.trim(),newEmail=document.getElementById('eu-e').value.trim(),cutoff=document.getElementById('eu-cut').value,reason=document.getElementById('eu-reason').value.trim();
  if(!newName||!newEmail){toast('Nombre y email son requeridos','err');return;}
  const users=await DDB.getAllUsers();const u=users.find(x=>x.id===userId);if(!u)return;
  const isReplacement=(newName!==u.name||newEmail!==u.email)&&cutoff;
  // If replacement: update history in all tasks assigned to this user
  if(isReplacement){
    const stages=await DDB.getStages(SEL_PROJ);
    for(const s of stages){
      const acts=await DDB.getActivities(s.id);
      for(const a of acts){
        const tasks=await DDB.getTasks(a.id);
        for(const task of tasks){
          if(task.responsible_id===userId){
            const hist=getHist(task);
            hist.push({prevName:u.name,prevEmail:u.email,newName,newEmail,cutoffDate:cutoff,reason,changedAt:new Date().toISOString()});
            await DDB.updateTask(task.id,{history:JSON.stringify(hist)});
            updateTaskRowDOM(task.id,{...task,history:JSON.stringify(hist)});
          }
        }
      }
    }
    if(!IS_DEMO)await addNotif(`&#x1F504; Responsable reemplazado: ${u.name} \u2192 ${newName} (desde ${fmtD(cutoff)})`);
    toast('Usuario actualizado con historial de reemplazo');
  } else {
    toast('Datos de usuario actualizados');
  }
  await DDB.saveUser({...u,name:newName,email:newEmail});
  closeModal();showView('team');
}

async function deleteUser(id){
  if(!confirm('Eliminar este usuario?'))return;
  await DDB.delUser(id);toast('Usuario eliminado');showView('team');
}

// ═══ PROFILE ════════════════════════════════════════════════════
async function saveProfile(){
  const name=document.getElementById('pf-name').value.trim(),email=document.getElementById('pf-email').value.trim();
  const currP=document.getElementById('pf-curr').value,newP=document.getElementById('pf-new').value,confP=document.getElementById('pf-conf').value;
  if(newP&&newP!==confP){toast('Las contrasenas no coinciden','err');return;}
  if(newP&&currP!==SESSION.password){toast('Contrasena actual incorrecta','err');return;}
  const patch={name,email,...(newP?{password:newP}:{})};
  if(SESSION.role==='admin')await DB.saveAdmin({...SESSION,...patch});
  else if(SESSION.role==='user')await DDB.saveUser({...SESSION,...patch});
  SESSION={...SESSION,...patch};
  updateSBUser();toast('Perfil actualizado');
}
