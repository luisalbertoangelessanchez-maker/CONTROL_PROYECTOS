<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANGELES GROUP · TeamProjects</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<!-- Supabase JS SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<!-- React -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#08090d;--surface:#0f1117;--surface2:#161b26;--surface3:#1c2133;
  --border:#1e2538;--border2:#283048;
  --accent:#f59e0b;--accent2:#fb923c;--accentD:#d97706;
  --green:#22c55e;--red:#ef4444;--blue:#3b82f6;--purple:#a855f7;--cyan:#06b6d4;
  --text:#dde3f0;--text2:#7d8ba0;--text3:#3d4a5c;
  --r:10px;--shadow:0 4px 32px rgba(0,0,0,.6);
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.5;overflow-x:hidden}
button{font-family:'DM Sans',sans-serif;cursor:pointer;border:none;outline:none}
input,select,textarea{font-family:'DM Sans',sans-serif;outline:none;background:var(--surface);color:var(--text)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.fade{animation:fadeIn .35s ease both}
.spin{animation:spin .8s linear infinite}
.pulse{animation:pulse 1.5s ease infinite}

/* badges */
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:600;white-space:nowrap}
.bg{background:rgba(74,85,104,.15);color:#8892a4;border:1px solid rgba(74,85,104,.2)}
.bb{background:rgba(59,130,246,.1);color:#3b82f6;border:1px solid rgba(59,130,246,.18)}
.bg2{background:rgba(34,197,94,.1);color:#22c55e;border:1px solid rgba(34,197,94,.18)}
.br{background:rgba(239,68,68,.1);color:#ef4444;border:1px solid rgba(239,68,68,.18)}
.ba{background:rgba(245,158,11,.1);color:#f59e0b;border:1px solid rgba(245,158,11,.18)}
.bp{background:rgba(168,85,247,.1);color:#a855f7;border:1px solid rgba(168,85,247,.18)}

/* inputs */
.input{width:100%;background:var(--surface2);border:1.5px solid var(--border2);color:var(--text);border-radius:var(--r);padding:9px 13px;font-size:13px;transition:border .2s,box-shadow .2s}
.input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(245,158,11,.1)}
.input::placeholder{color:var(--text3)}
.lbl{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--text2);margin-bottom:5px;display:block}
.fg{margin-bottom:14px}

/* buttons */
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:var(--r);font-size:13px;font-weight:600;transition:all .2s;white-space:nowrap;cursor:pointer}
.btn-p{background:var(--accent);color:#000;border:none}
.btn-p:hover{background:#fbbf24;transform:translateY(-1px);box-shadow:0 4px 20px rgba(245,158,11,.3)}
.btn-g{background:transparent;color:var(--text2);border:1.5px solid var(--border2)}
.btn-g:hover{border-color:var(--border2);color:var(--text);background:var(--surface2)}
.btn-d{background:rgba(239,68,68,.1);color:#ef4444;border:1px solid rgba(239,68,68,.18)}
.btn-d:hover{background:rgba(239,68,68,.18)}
.btn-s{padding:6px 12px!important;font-size:12px!important}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important}

/* layout */
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px}
.pb{height:5px;background:var(--surface3);border-radius:99px;overflow:hidden}
.pf{height:100%;border-radius:99px;transition:width .6s ease}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(6px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .2s ease}
.md{background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:28px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 32px 100px rgba(0,0,0,.7)}
.sb{position:fixed;left:0;top:0;bottom:0;width:228px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:100}
.ni{display:flex;align-items:center;gap:10px;padding:10px 16px;border-radius:8px;margin:2px 8px;color:var(--text2);cursor:pointer;transition:all .2s;font-size:13px;font-weight:500;user-select:none}
.ni:hover{background:var(--surface2);color:var(--text)}
.ni.act{background:rgba(245,158,11,.08);color:var(--accent);border:1px solid rgba(245,158,11,.12)}
.ns{padding:14px 16px 5px;font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text3)}
.main{margin-left:228px;min-height:100vh;padding:30px}
.tbl{width:100%;border-collapse:collapse}
.tbl th{padding:10px 14px;text-align:left;font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--text3);border-bottom:1px solid var(--border)}
.tbl td{padding:11px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
.tbl tr:hover td{background:var(--surface2)}
.tbl tr:last-child td{border-bottom:none}
.av{border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-weight:700;color:#000;flex-shrink:0}

/* config banner */
.cfg-banner{background:linear-gradient(135deg,rgba(245,158,11,.12),rgba(251,146,60,.08));border:1px solid rgba(245,158,11,.25);border-radius:12px;padding:20px 24px;margin-bottom:28px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback,useMemo}=React;

// ═══════════════════════════════════════════════════════════════
//  ⚙  CONFIGURACIÓN SUPABASE
//  1. Ve a supabase.com → Tu proyecto → Settings → API
//  2. Copia "Project URL" y "anon public key"
//  3. Pégalos aquí abajo
// ═══════════════════════════════════════════════════════════════
const SUPABASE_URL = "REEMPLAZA_CON_TU_URL";          // ej: https://xyzabc.supabase.co
const SUPABASE_KEY = "REEMPLAZA_CON_TU_ANON_KEY";     // ej: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...

// Detectar si está configurado
const IS_CONFIGURED = !SUPABASE_URL.includes("REEMPLAZA") && !SUPABASE_KEY.includes("REEMPLAZA");
const supabase = IS_CONFIGURED ? window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY) : null;

// ─── HELPERS ──────────────────────────────────────────────────
const TODAY = new Date(); TODAY.setHours(0,0,0,0);
const fmtToday = TODAY.toISOString().split('T')[0];
const fmt = d => d instanceof Date ? d.toISOString().split('T')[0] : d;
const addD = (d,n) => { const x=new Date(d); x.setDate(x.getDate()+n); return x; };
const diffD = (a,b) => Math.max(0, Math.round((new Date(b)-new Date(a))/86400000));
const ini = n => n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
const s2p = s => [0,20,40,60,80,100][s]??0;
const uid = pfx => pfx+(Date.now())+Math.random().toString(36).slice(2,6);
const COLS = ['#f59e0b','#22c55e','#3b82f6','#a855f7','#06b6d4','#fb923c','#ec4899','#14b8a6'];

// Super Admin (local, no en DB)
const SUPER = {id:'sa',name:'Super Admin',email:'super@angelesgroup.io',role:'superadmin',password:'Angeles2024!'};

function calcStatus(task){
  const now=new Date(fmtToday), start=new Date(task.start_date||task.startDate), end=new Date(task.end_date||task.endDate);
  const done=(task.evidence&&(Array.isArray(task.evidence)?task.evidence:JSON.parse(task.evidence||'[]')).length>0)||task.stars===5;
  if(done) return now<=end?{label:'Ejecutado en plazo',cls:'bg2',icon:'✓'}:{label:'Ejecutado fuera de plazo',cls:'ba',icon:'✓'};
  if(task.stars>0) return now<=end?{label:'En proceso – en plazo',cls:'bb',icon:'▶'}:{label:'En proceso – fuera de plazo',cls:'br',icon:'⚠'};
  if(now<start) return {label:'No iniciado',cls:'bg',icon:'○'};
  return {label:'No iniciado – fuera de plazo',cls:'br',icon:'✕'};
}

// ═══════════════════════════════════════════════════════════════
//  DB LAYER — Supabase o localStorage fallback
// ═══════════════════════════════════════════════════════════════
const DB = {
  async getAdmins(){ if(!supabase)return lsGet('admins',[]); const{data}=await supabase.from('admins').select('*'); return data||[]; },
  async saveAdmin(a){ if(!supabase){lsUpsert('admins',a);return;} await supabase.from('admins').upsert(a); },
  async delAdmin(id){ if(!supabase){lsDel('admins',id);return;} await supabase.from('admins').delete().eq('id',id); },

  async getUsers(adminId){ if(!supabase)return lsGet('users',[]).filter(u=>!adminId||u.admin_id===adminId||u.adminId===adminId); const{data}=await supabase.from('users').select('*').eq('admin_id',adminId); return data||[]; },
  async getAllUsers(){ if(!supabase)return lsGet('users',[]); const{data}=await supabase.from('users').select('*'); return data||[]; },
  async saveUser(u){ if(!supabase){lsUpsert('users',u);return;} await supabase.from('users').upsert(u); },
  async delUser(id){ if(!supabase){lsDel('users',id);return;} await supabase.from('users').delete().eq('id',id); },

  async getProjects(adminId){ if(!supabase)return lsGet('projects',[]).filter(p=>!adminId||p.admin_id===adminId||p.adminId===adminId); const{data}=await supabase.from('projects').select('*').eq('admin_id',adminId); return data||[]; },
  async getAllProjects(){ if(!supabase)return lsGet('projects',[]); const{data}=await supabase.from('projects').select('*'); return data||[]; },
  async saveProject(p){ if(!supabase){lsUpsert('projects',p);return;} await supabase.from('projects').upsert(p); },

  async getStages(projectId){ if(!supabase)return lsGet('stages',[]).filter(s=>s.project_id===projectId||s.projectId===projectId); const{data}=await supabase.from('stages').select('*').eq('project_id',projectId).order('order_num'); return data||[]; },
  async saveStage(s){ if(!supabase){lsUpsert('stages',s);return;} await supabase.from('stages').upsert(s); },

  async getActivities(stageId){ if(!supabase)return lsGet('activities',[]).filter(a=>a.stage_id===stageId||a.stageId===stageId); const{data}=await supabase.from('activities').select('*').eq('stage_id',stageId); return data||[]; },
  async saveActivity(a){ if(!supabase){lsUpsert('activities',a);return;} await supabase.from('activities').upsert(a); },

  async getTasks(activityId){ if(!supabase)return lsGet('tasks',[]).filter(t=>t.activity_id===activityId||t.activityId===activityId); const{data}=await supabase.from('tasks').select('*').eq('activity_id',activityId); return data||[]; },
  async updateTask(id,patch){ if(!supabase){lsPatch('tasks',id,patch);return;} await supabase.from('tasks').update(patch).eq('id',id); },
  async saveTask(t){ if(!supabase){lsUpsert('tasks',t);return;} await supabase.from('tasks').upsert(t); },

  async addNotif(msg,toUsers){ if(!supabase){const n={id:Date.now(),message:msg,to_users:toUsers,read_by:[],created_at:new Date().toISOString()};lsUpsert('notifs',n);return;} await supabase.from('notifications').insert({message:msg,to_users:toUsers}); },
  async getNotifs(){ if(!supabase)return lsGet('notifs',[]); const{data}=await supabase.from('notifications').select('*').order('created_at',{ascending:false}).limit(50); return data||[]; },
  async markRead(id,userId){ if(!supabase){lsPatchArr('notifs',id,'read_by',userId);return;} const{data}=await supabase.from('notifications').select('read_by').eq('id',id).single(); const rb=data?.read_by||[]; if(!rb.includes(userId)) await supabase.from('notifications').update({read_by:[...rb,userId]}).eq('id',id); },

  // Auth helper
  async login(email,pass){
    if(email===SUPER.email&&pass===SUPER.password) return SUPER;
    if(!supabase){
      const admins=lsGet('admins',SEED_ADMINS); const a=admins.find(x=>x.email===email&&x.password===pass); if(a) return{...a,role:'admin'};
      const users=lsGet('users',SEED_USERS); const u=users.find(x=>x.email===email&&x.password===pass); if(u) return{...u,role:'user'};
      return null;
    }
    const{data:admins}=await supabase.from('admins').select('*').eq('email',email).eq('password',pass); if(admins?.length) return{...admins[0],role:'admin'};
    const{data:users}=await supabase.from('users').select('*').eq('email',email).eq('password',pass); if(users?.length) return{...users[0],role:'user'};
    return null;
  }
};

// localStorage helpers
const lsGet=(k,def)=>{try{const v=localStorage.getItem('tp_'+k);return v?JSON.parse(v):def;}catch{return def;}};
const lsSet=(k,v)=>{try{localStorage.setItem('tp_'+k,JSON.stringify(v));}catch{}};
const lsUpsert=(k,item)=>{const arr=lsGet(k,[]);const i=arr.findIndex(x=>x.id===item.id);if(i>=0)arr[i]={...arr[i],...item};else arr.push(item);lsSet(k,arr);};
const lsDel=(k,id)=>lsSet(k,lsGet(k,[]).filter(x=>x.id!==id));
const lsPatch=(k,id,patch)=>{const arr=lsGet(k,[]);const i=arr.findIndex(x=>x.id===id);if(i>=0)arr[i]={...arr[i],...patch};lsSet(k,arr);};
const lsPatchArr=(k,id,field,val)=>{const arr=lsGet(k,[]);const i=arr.findIndex(x=>x.id===id);if(i>=0&&!arr[i][field]?.includes(val)){arr[i][field]=[...(arr[i][field]||[]),val];lsSet(k,arr);}};

// Seed data for localStorage mode
const SEED_ADMINS=[{id:'adm1',name:'Carlos Vega',email:'carlos@obrafirme.pe',password:'Admin123!',company:'Obra Firme SAC'}];
const SEED_USERS=[
  {id:'u1',name:'María Torres',email:'maria@obrafirme.pe',password:'User123!',admin_id:'adm1'},
  {id:'u2',name:'José Ramírez',email:'jose@obrafirme.pe',password:'User123!',admin_id:'adm1'},
  {id:'u3',name:'Ana Quispe',email:'ana@obrafirme.pe',password:'User123!',admin_id:'adm1'},
];

// ═══════════════════════════════════════════════════════════════
//  APP ROOT
// ═══════════════════════════════════════════════════════════════
export default function App(){
  const [session,setSession]=useState(null);
  const [view,setView]=useState('dashboard');
  const [selProj,setSelProj]=useState(null);
  const [notifs,setNotifs]=useState([]);
  const [notifOpen,setNotifOpen]=useState(false);
  const [toast,setToast]=useState(null);
  const [loading,setLoading]=useState(false);

  // Poll notifs every 15s if supabase configured
  useEffect(()=>{
    if(!session)return;
    const load=async()=>{const n=await DB.getNotifs();setNotifs(n);};
    load();
    const iv=IS_CONFIGURED?setInterval(load,15000):null;
    return()=>iv&&clearInterval(iv);
  },[session]);

  // Realtime subscription
  useEffect(()=>{
    if(!supabase||!session)return;
    const ch=supabase.channel('notifs').on('postgres_changes',{event:'INSERT',schema:'public',table:'notifications'},()=>{
      DB.getNotifs().then(setNotifs);
    }).subscribe();
    return()=>supabase.removeChannel(ch);
  },[session]);

  const showToast=(msg,type='ok')=>{setToast({msg,type});setTimeout(()=>setToast(null),3800);};
  const addNotif=async(msg,toUsers=[])=>{ await DB.addNotif(msg,toUsers); const n=await DB.getNotifs(); setNotifs(n); };

  if(!session) return <Login onLogin={async(email,pass)=>{
    setLoading(true);
    const u=await DB.login(email,pass);
    setLoading(false);
    if(u) setSession(u); else showToast('Credenciales incorrectas','err');
  }} loading={loading} toast={toast}/>;

  const canAdmin=session.role==='admin'||session.role==='superadmin';
  const myNotifs=notifs.filter(n=>{
    const toU=n.to_users||n.toUsers||[];
    return toU.length===0||toU.includes(session.id);
  });
  const unread=myNotifs.filter(n=>!(n.read_by||[]).includes(session.id)).length;

  const navTo=(v,pid)=>{if(pid!==undefined)setSelProj(pid);setView(v);setNotifOpen(false);};

  return(
    <div>
      {/* Toast */}
      {toast&&<div style={{position:'fixed',top:20,right:20,zIndex:9999,background:toast.type==='err'?'#ef4444':'#22c55e',color:'#fff',padding:'12px 20px',borderRadius:10,fontWeight:600,fontSize:13,boxShadow:'0 8px 40px rgba(0,0,0,.5)',animation:'fadeIn .3s ease',maxWidth:360}}>
        {toast.type==='err'?'✕ ':'✓ '}{toast.msg}
      </div>}

      {/* Sidebar */}
      <Sidebar session={session} view={view} selProj={selProj} navTo={navTo}
        unread={unread} notifOpen={notifOpen} setNotifOpen={setNotifOpen}
        onLogout={()=>{setSession(null);setView('dashboard');setSelProj(null);}}
        canAdmin={canAdmin}/>

      {/* Notif panel */}
      {notifOpen&&<NotifPanel notifs={myNotifs} session={session} onClose={()=>setNotifOpen(false)}
        onRead={async(id)=>{await DB.markRead(id,session.id);const n=await DB.getNotifs();setNotifs(n);}}/>}

      {/* Main */}
      <main className="main fade" key={view+'_'+selProj}>
        {!IS_CONFIGURED&&<ConfigBanner/>}
        {view==='dashboard'&&<DashView session={session} selProj={selProj} showToast={showToast}/>}
        {view==='tasks'&&<TasksView session={session} selProj={selProj} showToast={showToast} addNotif={addNotif} canAdmin={canAdmin}/>}
        {view==='gantt'&&<GanttView selProj={selProj}/>}
        {view==='team'&&<TeamView session={session} selProj={selProj} showToast={showToast} canAdmin={canAdmin}/>}
        {view==='stages'&&<StagesView session={session} selProj={selProj} showToast={showToast} canAdmin={canAdmin}/>}
        {view==='admins'&&<AdminsView session={session} showToast={showToast}/>}
        {view==='newproject'&&<NewProjView session={session} showToast={showToast} onCreated={id=>navTo('tasks',id)}/>}
        {view==='profile'&&<ProfileView session={session} showToast={showToast} setSession={setSession}/>}
        {view==='platform'&&<PlatformView/>}
      </main>
    </div>
  );
}

// ─── CONFIG BANNER ──────────────────────────────────────────────
function ConfigBanner(){
  return<div className="cfg-banner">
    <div style={{display:'flex',gap:14,alignItems:'flex-start'}}>
      <span style={{fontSize:28}}>⚙</span>
      <div>
        <div style={{fontWeight:700,fontSize:14,color:'var(--accent)',marginBottom:4}}>Modo Offline — Configurar Supabase para sincronización en la nube</div>
        <div style={{fontSize:12,color:'var(--text2)',lineHeight:1.7}}>
          Los datos se guardan en <strong style={{color:'var(--text)'}}>localStorage</strong> de este navegador.<br/>
          Para acceder desde cualquier lugar y dispositivo, edita el archivo HTML y reemplaza:<br/>
          <code style={{background:'rgba(0,0,0,.3)',padding:'2px 8px',borderRadius:5,fontSize:11,color:'var(--accent)'}}>SUPABASE_URL</code> y <code style={{background:'rgba(0,0,0,.3)',padding:'2px 8px',borderRadius:5,fontSize:11,color:'var(--accent)'}}>SUPABASE_KEY</code>
          {' '}con tus credenciales de <a href="https://supabase.com" target="_blank" style={{color:'var(--cyan)'}}>supabase.com</a>.<br/>
          Consulta el archivo <strong style={{color:'var(--text)'}}>GUIA_SUPABASE.md</strong> incluido para instrucciones paso a paso.
        </div>
      </div>
    </div>
  </div>;
}

// ─── LOGO HEADER COMPONENT ─────────────────────────────────────

      <div style={{background:'linear-gradient(135deg,#1e3a5f,#0f2340)',border:'1px solid rgba(59,130,246,.3)',borderRadius:big?12:8,padding:big?'8px 14px':'5px 10px',display:'flex',alignItems:'center',gap:big?8:5}}>

// ─── SIDEBAR ────────────────────────────────────────────────────
function Sidebar({session,view,selProj,navTo,unread,notifOpen,setNotifOpen,onLogout,canAdmin}){
  const [projects,setProjects]=useState([]);
  useEffect(()=>{
    if(!session)return;
    const load=async()=>{
      const p=session.role==='superadmin'?await DB.getAllProjects():canAdmin?await DB.getProjects(session.id):[];
      setProjects(p);
    };
    load();
    if(supabase){
      const ch=supabase.channel('proj_sb').on('postgres_changes',{event:'*',schema:'public',table:'projects'},load).subscribe();
      return()=>supabase.removeChannel(ch);
    }
  },[session,view]);

  return<nav className="sb">

// ─── DASHBOARD ──────────────────────────────────────────────────
function DashView({session,selProj,showToast}){
  const [data,setData]=useState(null);
  const [loading,setLoading]=useState(true);

  useEffect(()=>{
    if(!selProj){setLoading(false);return;}
    loadAll();
    if(supabase){
      const ch=supabase.channel('dash').on('postgres_changes',{event:'UPDATE',schema:'public',table:'tasks'},loadAll).subscribe();
      return()=>supabase.removeChannel(ch);
    }
  },[selProj]);

  async function loadAll(){
    setLoading(true);
    const [projects,admins,allUsers]=await Promise.all([DB.getAllProjects(),DB.getAdmins(),DB.getAllUsers()]);
    const proj=projects.find(p=>p.id===selProj);
    if(!proj){setData(null);setLoading(false);return;}
    const stages=await DB.getStages(proj.id);
    const acts=await Promise.all(stages.map(s=>DB.getActivities(s.id)));
    const tasks=await Promise.all(acts.flat().map(a=>DB.getTasks(a.id)));
    const allTasks=tasks.flat();
    setData({proj,stages,acts:acts.flat(),allTasks,admins,allUsers});
    setLoading(false);
  }

  if(loading) return<Loader/>;
  if(!selProj||!data) return<NoProj/>;

  const{proj,stages,acts,allTasks,allUsers}=data;
  const total=allTasks.length;
  const done=allTasks.filter(t=>t.stars===5||getEvArr(t).length>0).length;
  const inProg=allTasks.filter(t=>t.stars>0&&t.stars<5&&!getEvArr(t).length).length;
  const overPct=total?Math.round(allTasks.reduce((a,t)=>a+s2p(t.stars),0)/total):0;
  const totalD=diffD(proj.start_date,proj.end_date);
  const elapsed=diffD(proj.start_date,fmtToday);
  const timePct=Math.min(100,Math.round((elapsed/Math.max(1,totalD))*100));
  const overdue=allTasks.filter(t=>calcStatus(t).label.includes('fuera')).length;

  const byStage=stages.map((s,i)=>{
    const sActs=acts.filter(a=>a.stage_id===s.id);
    const sTasks=allTasks.filter(t=>sActs.some(a=>a.id===t.activity_id));
    const pct=sTasks.length?Math.round(sTasks.reduce((a,t)=>a+s2p(t.stars),0)/sTasks.length):0;
    return{s,sTasks,pct,col:COLS[i%COLS.length]};
  });

  const byUser=allUsers.map((u,i)=>{
    const myT=allTasks.filter(t=>t.responsible_id===u.id);
    if(!myT.length)return null;
    const pct=Math.round(myT.reduce((a,t)=>a+s2p(t.stars),0)/myT.length);
    return{u,myT,pct,done:myT.filter(t=>t.stars===5).length,col:COLS[i%COLS.length]};
  }).filter(Boolean);

  return<div>
    <Hdr title="DASHBOARD DEL PROYECTO" sub={proj.name}/>
    <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:16,marginBottom:24}}>
      {[
        {icon:'📈',label:'Avance General',val:`${overPct}%`,sub:`${done}/${total} tareas completadas`,col:'var(--accent)'},
        {icon:'⏱',label:'Tiempo Transcurrido',val:`${timePct}%`,sub:`${elapsed} / ${totalD} días`,col:'var(--blue)'},
        {icon:'✅',label:'Ejecutadas',val:done,sub:`${inProg} en proceso`,col:'var(--green)'},
        {icon:'⚠',label:'Fuera de Plazo',val:overdue,sub:'tareas vencidas',col:'var(--red)'},
      ].map(k=><KPICard key={k.label} {...k}/>)}
    </div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:16}}>
      <div className="card">
        <div style={{fontWeight:700,marginBottom:16,fontSize:13}}>📊 Avance por Etapa</div>
        {byStage.map(item=><div key={item.s.id} style={{marginBottom:14}}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:5}}>
            <span style={{fontSize:12,fontWeight:600}}>{item.s.name}</span>
            <span style={{fontSize:12,fontFamily:"'JetBrains Mono',monospace",color:'var(--accent)',fontWeight:700}}>{item.pct}%</span>
          </div>
          <div className="pb"><div className="pf" style={{width:`${item.pct}%`,background:item.col}}/></div>
          <div style={{fontSize:10,color:'var(--text3)',marginTop:2}}>{item.sTasks.length} tareas · {item.sTasks.filter(t=>t.stars===5).length} ejecutadas</div>
        </div>)}
      </div>
      <div className="card">
        <div style={{fontWeight:700,marginBottom:16,fontSize:13}}>👥 Avance por Responsable</div>
        {byUser.map(item=><div key={item.u.id} style={{display:'flex',alignItems:'center',gap:12,marginBottom:14}}>
          <Av name={item.u.name} size={32}/>
          <div style={{flex:1}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:5}}>
              <span style={{fontSize:12,fontWeight:600}}>{item.u.name}</span>
              <span style={{fontSize:12,fontFamily:"'JetBrains Mono',monospace",color:'var(--accent)',fontWeight:700}}>{item.pct}%</span>
            </div>
            <div className="pb"><div className="pf" style={{width:`${item.pct}%`,background:item.col}}/></div>
            <div style={{fontSize:10,color:'var(--text3)',marginTop:2}}>{item.done}/{item.myT.length} completadas</div>
          </div>
        </div>)}
      </div>
    </div>
    <div className="card">
      <div style={{fontWeight:700,marginBottom:14,fontSize:13}}>📋 Estados</div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12}}>
        {['No iniciado','Fuera de plazo','En proceso','Ejecutado'].map(l=>{
          const cnt=l==='No iniciado'?allTasks.filter(t=>calcStatus(t).label.startsWith('No iniciado')&&!calcStatus(t).label.includes('fuera')).length:
                    l==='Fuera de plazo'?allTasks.filter(t=>calcStatus(t).label.includes('fuera')).length:
                    l==='En proceso'?allTasks.filter(t=>calcStatus(t).label.startsWith('En proceso')).length:
                    allTasks.filter(t=>calcStatus(t).label.startsWith('Ejecutado')).length;
          const col=l==='Ejecutado'?'var(--green)':l==='Fuera de plazo'?'var(--red)':l==='En proceso'?'var(--blue)':'var(--text3)';
          return<div key={l} style={{textAlign:'center',padding:'16px 10px',background:'var(--surface2)',borderRadius:10}}>
            <div style={{fontSize:30,fontWeight:700,color:col,fontFamily:"'JetBrains Mono',monospace"}}>{cnt}</div>
            <div style={{fontSize:11,color:'var(--text2)',marginTop:4}}>{l}</div>
          </div>;
        })}
      </div>
    </div>
  </div>;
}

function KPICard({icon,label,val,sub,col}){
  return<div className="card" style={{position:'relative',overflow:'hidden',border:'1px solid var(--border2)'}}>
    <div style={{position:'absolute',top:-10,right:-10,fontSize:56,opacity:.05}}>{icon}</div>
    <div style={{fontSize:22,marginBottom:4}}>{icon}</div>

// ─── TASKS VIEW ──────────────────────────────────────────────────
function TasksView({session,selProj,showToast,addNotif,canAdmin}){
  const [struct,setStruct]=useState([]);
  const [allUsers,setAllUsers]=useState([]);
  const [loading,setLoading]=useState(true);
  const [expS,setExpS]=useState({});
  const [expA,setExpA]=useState({});
  const [reschedModal,setReschedModal]=useState(null);
  const [evidModal,setEvidModal]=useState(null);
  const [proj,setProj]=useState(null);

  const load=useCallback(async()=>{
    if(!selProj&&session.role!=='user'){setLoading(false);return;}
    setLoading(true);
    const [allProj,allU]=await Promise.all([DB.getAllProjects(),DB.getAllUsers()]);
    let p=selProj?allProj.find(x=>x.id===selProj):null;
    if(session.role==='user'&&!p){
      // Find project where user has tasks
      for(const proj of allProj){
        const stages=await DB.getStages(proj.id);
        for(const s of stages){const acts=await DB.getActivities(s.id);for(const a of acts){const tasks=await DB.getTasks(a.id);if(tasks.some(t=>t.responsible_id===session.id)){p=proj;break;}}}
        if(p)break;
      }
    }
    if(!p){setLoading(false);return;}
    setProj(p);
    setAllUsers(allU);
    const stages=await DB.getStages(p.id);
    const result=await Promise.all(stages.map(async s=>{
      const acts=await DB.getActivities(s.id);
      const actsWithTasks=await Promise.all(acts.map(async a=>{
        const tasks=await DB.getTasks(a.id);
        const filtered=canAdmin?tasks:tasks.filter(t=>t.responsible_id===session.id);
        return{...a,tasks:filtered};
      }));
      return{...s,activities:actsWithTasks.filter(a=>canAdmin||a.tasks.length)};
    }));
    setStruct(result.filter(s=>canAdmin||s.activities.length));
    setLoading(false);
  },[selProj,session,canAdmin]);

  useEffect(()=>{load();},[load]);

  // Realtime
  useEffect(()=>{
    if(!supabase)return;
    const ch=supabase.channel('tasks_live').on('postgres_changes',{event:'*',schema:'public',table:'tasks'},load).subscribe();
    return()=>supabase.removeChannel(ch);
  },[load]);

  const getUser=id=>allUsers.find(u=>u.id===id)||{name:'Sin asignar'};

  const updateTask=async(taskId,patch)=>{
    await DB.updateTask(taskId,patch);
    await load();
  };

  const handleStar=async(task,stars)=>{
    if(getEvArr(task).length>0||task.stars===5){showToast('Las 5★ se activan al subir evidencia','err');return;}
    if(stars===5){showToast('Sube la evidencia para completar al 100%','err');return;}
    if(!canAdmin&&task.responsible_id!==session.id){showToast('Solo el responsable puede actualizar el avance','err');return;}
    await updateTask(task.id,{stars});
    await addNotif(`📊 "${task.name}" → ${s2p(stars)}% — actualizado por ${session.name}`);
    showToast(`Avance actualizado a ${s2p(stars)}%`);
  };

  const handleEvidence=async(task,files)=>{
    if(!files||!files.length)return;
    const cur=getEvArr(task);
    const newEvs=Array.from(files).map(f=>({name:f.name,type:f.type.startsWith('image')?'image':f.type==='application/pdf'?'pdf':f.type.startsWith('video')?'video':'doc',size:f.size}));
    await updateTask(task.id,{evidence:JSON.stringify([...cur,...newEvs]),stars:5});
    await addNotif(`📎 Evidencia cargada en "${task.name}" por ${session.name} — ¡100%! ⭐⭐⭐⭐⭐`);
    showToast('Evidencia cargada — Tarea al 100% ⭐⭐⭐⭐⭐');
    setEvidModal(null);
  };

  const handleReschedule=async(task,ns,ne,reason)=>{
    if((task.rescheduled||0)>=3){showToast('Máximo 3 reprogramaciones','err');return;}
    if(canAdmin){
      await updateTask(task.id,{start_date:ns,end_date:ne,rescheduled:(task.rescheduled||0)+1,reschedule_pending:false});
      await addNotif(`🔄 "${task.name}" reprogramada por ${session.name}`);
      showToast('Reprogramación aplicada');
    } else {
      await updateTask(task.id,{pending_start:ns,pending_end:ne,pending_reason:reason,reschedule_pending:true});
      await addNotif(`🔄 Solicitud de reprogramación: "${task.name}" por ${session.name}`);
      showToast('Solicitud enviada al administrador');
    }
    setReschedModal(null);
  };

  const approveResched=async(task)=>{
    await updateTask(task.id,{start_date:task.pending_start,end_date:task.pending_end,rescheduled:(task.rescheduled||0)+1,reschedule_pending:false,pending_start:null,pending_end:null,pending_reason:null});
    await addNotif(`✅ Reprogramación aprobada: "${task.name}"`);
    showToast('Reprogramación aprobada');
  };

  if(loading) return<Loader/>;
  if(!proj) return<NoProj/>;

  return<div>
    <Hdr title="CONTROL DE TAREAS" sub={proj.name+' · '+new Date(proj.start_date).toLocaleDateString('es-PE')+' → '+new Date(proj.end_date).toLocaleDateString('es-PE')}/>

    {struct.map((stage,si)=>(
      <div key={stage.id} style={{marginBottom:10}}>
        <div style={{display:'flex',alignItems:'center',gap:12,padding:'12px 18px',background:'var(--surface2)',border:'1px solid var(--border2)',borderRadius:10,cursor:'pointer',marginBottom:expS[stage.id]?6:0}}
          onClick={()=>setExpS(p=>({...p,[stage.id]:!p[stage.id]}))}>
          <span style={{color:'var(--accent)',fontWeight:700,fontSize:13,flexShrink:0}}>{expS[stage.id]?'▼':'▶'}</span>
          <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:15,letterSpacing:1,color:'var(--accent)',flex:1}}>ETAPA {si+1}: {stage.name}</span>
          <StagePct stage={stage}/>
        </div>

        {expS[stage.id]&&<div style={{paddingLeft:12}}>
          {stage.activities.map((act,ai)=>(
            <div key={act.id} style={{marginBottom:6}}>
              <div style={{display:'flex',alignItems:'center',gap:10,padding:'9px 16px',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:8,cursor:'pointer',marginBottom:expA[act.id]?4:0}}
                onClick={()=>setExpA(p=>({...p,[act.id]:!p[act.id]}))}>
                <span style={{fontSize:11,color:'var(--text3)',flexShrink:0}}>{expA[act.id]?'▼':'▶'}</span>
                <span style={{fontWeight:600,fontSize:13,flex:1}}>Actividad {si+1}.{ai+1}: {act.name}</span>
                <span style={{fontSize:11,color:'var(--text3)'}}>{act.tasks.length} tareas</span>
              </div>

              {expA[act.id]&&<div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:8,overflow:'hidden',marginBottom:2}}>
                <div style={{overflowX:'auto'}}>
                <table className="tbl" style={{minWidth:960}}>
                  <thead><tr>
                    <th>Tarea</th><th>Responsable</th><th>Inicio</th><th>Fin</th><th>Días</th>
                    <th>Progreso ★</th><th>Estado</th><th>Evidencia</th><th>Acciones</th>
                  </tr></thead>
                  <tbody>
                    {act.tasks.map(task=>{
                      const u=getUser(task.responsible_id);
                      const days=diffD(task.start_date,task.end_date);
                      const canAct=canAdmin||task.responsible_id===session.id;
                      const st=calcStatus(task);
                      const ev=getEvArr(task);
                      return<tr key={task.id}>
                        <td>
                          <div style={{fontWeight:600,fontSize:12,maxWidth:200}}>{task.name}</div>
                          {task.rescheduled>0&&<div style={{fontSize:10,color:'var(--accent)'}}>🔄 Reprog. {task.rescheduled}×</div>}
                          {task.reschedule_pending&&<div style={{fontSize:10,color:'var(--red)'}}>⏳ Pendiente aprobación admin</div>}
                        </td>
                        <td>
                          <div style={{display:'flex',alignItems:'center',gap:7}}>
                            <Av name={u.name} size={26}/>
                            <span style={{fontSize:12}}>{u.name}</span>
                          </div>
                        </td>
                        <td><span style={{fontSize:11,fontFamily:"'JetBrains Mono',monospace"}}>{new Date(task.start_date).toLocaleDateString('es-PE')}</span></td>
                        <td><span style={{fontSize:11,fontFamily:"'JetBrains Mono',monospace"}}>{new Date(task.end_date).toLocaleDateString('es-PE')}</span></td>
                        <td><span style={{fontSize:12,fontWeight:700,fontFamily:"'JetBrains Mono',monospace"}}>{days}d</span></td>
                        <td>
                          <div>
                            <div style={{display:'flex',gap:2,marginBottom:2}}>
                              {[1,2,3,4,5].map(s=>(
                                <span key={s}
                                  style={{fontSize:18,color:s<=task.stars?'var(--accent)':'var(--border2)',cursor:canAct&&s<5?'pointer':'default',transition:'transform .1s',display:'inline-block'}}
                                  onClick={()=>canAct&&handleStar(task,s)}
                                  onMouseEnter={e=>{if(canAct&&s<5)e.target.style.transform='scale(1.3)';}}
                                  onMouseLeave={e=>e.target.style.transform='scale(1)'}
                                  title={s<5?`Marcar ${s2p(s)}%`:'Se activa automáticamente con evidencia'}>★</span>
                              ))}
                            </div>
                            <span style={{fontSize:10,fontFamily:"'JetBrains Mono',monospace",color:'var(--accent)',fontWeight:700}}>{s2p(task.stars)}%</span>
                          </div>
                        </td>
                        <td><span className={`badge ${st.cls}`}>{st.icon} {st.label}</span></td>
                        <td>
                          {ev.length>0
                            ?<button className="badge bg2" style={{cursor:'pointer',border:'1px solid rgba(34,197,94,.18)'}} onClick={()=>setEvidModal({task,view:true})}>📎 {ev.length} archivo{ev.length>1?'s':''}</button>
                            :canAct?<button className="btn btn-g btn-s" onClick={()=>setEvidModal({task,view:false})}>↑ Subir</button>:<span style={{color:'var(--text3)',fontSize:11}}>—</span>}
                        </td>
                        <td>
                          <div style={{display:'flex',gap:5'}}>
                            {canAct&&(task.rescheduled||0)<3&&!task.reschedule_pending&&
                              <button className="btn btn-g btn-s" title="Reprogramar" onClick={()=>setReschedModal(task)}>🔄</button>}
                            {canAdmin&&task.reschedule_pending&&
                              <button className="btn btn-p btn-s" onClick={()=>approveResched(task)}>✓ Aprobar</button>}
                          </div>
                        </td>
                      </tr>;
                    })}
                  </tbody>
                </table>
                </div>
              </div>}
            </div>
          ))}
        </div>}
      </div>
    ))}

    {reschedModal&&<ReschedModal task={reschedModal} canAdmin={canAdmin} onClose={()=>setReschedModal(null)} onConfirm={handleReschedule}/>}
    {evidModal&&<EvidModal task={evidModal.task} viewOnly={evidModal.view} onClose={()=>setEvidModal(null)} onUpload={handleEvidence}/>}
  </div>;
}

function getEvArr(task){
  try{const e=task.evidence;return Array.isArray(e)?e:(typeof e==='string'?JSON.parse(e||'[]'):[]);}catch{return[];}
}

function StagePct({stage}){
  const tasks=stage.activities?.flatMap(a=>a.tasks)||[];
  if(!tasks.length)return null;
  const pct=Math.round(tasks.reduce((a,t)=>a+s2p(t.stars),0)/tasks.length);
  return<div style={{display:'flex',alignItems:'center',gap:8}}>
    <div style={{width:70,height:4,background:'var(--surface3)',borderRadius:99,overflow:'hidden'}}>
      <div style={{height:'100%',width:`${pct}%`,background:pct===100?'var(--green)':'var(--accent)',borderRadius:99}}/>
    </div>
    <span style={{fontSize:11,fontFamily:"'JetBrains Mono',monospace",color:'var(--accent)',fontWeight:700}}>{pct}%</span>
  </div>;
}

// ─── GANTT ───────────────────────────────────────────────────────
function GanttView({selProj}){
  const [data,setData]=useState(null);
  const [loading,setLoading]=useState(true);
  useEffect(()=>{
    if(!selProj){setLoading(false);return;}
    (async()=>{
      const projects=await DB.getAllProjects(); const proj=projects.find(p=>p.id===selProj);
      if(!proj){setLoading(false);return;}
      const stages=await DB.getStages(proj.id);
      const full=await Promise.all(stages.map(async s=>{
        const acts=await DB.getActivities(s.id);
        const withTasks=await Promise.all(acts.map(async a=>({...a,tasks:await DB.getTasks(a.id)})));
        return{...s,activities:withTasks};
      }));
      setData({proj,stages:full}); setLoading(false);
    })();
  },[selProj]);
  if(loading)return<Loader/>;
  if(!data)return<NoProj/>;
  const{proj,stages}=data;
  const allT=stages.flatMap(s=>s.activities.flatMap(a=>a.tasks));
  if(!allT.length)return<div style={{padding:'60px 0',textAlign:'center',color:'var(--text3)'}}>Sin tareas aún</div>;
  const dates=allT.flatMap(t=>[new Date(t.start_date),new Date(t.end_date)]);
  const minD=new Date(Math.min(...dates)), maxD=new Date(Math.max(...dates));
  const span=diffD(fmt(minD),fmt(maxD))+14;
  const todayOff=diffD(fmt(minD),fmtToday);
  const L=t=>(diffD(fmt(minD),t.start_date)/span)*100;
  const W=t=>Math.max(.8,(diffD(t.start_date,t.end_date)/span)*100);

  return<div>
    <Hdr title="DIAGRAMA GANTT" sub={proj.name}/>
    <div className="card" style={{overflowX:'auto',padding:0}}>
      <div style={{minWidth:1000,padding:20}}>
        <div style={{position:'relative',height:28,marginBottom:6,marginLeft:275,borderBottom:'1px solid var(--border)'}}>
          <div style={{position:'absolute',left:`${(todayOff/span)*100}%`,top:0,bottom:0,width:2,background:'var(--red)',opacity:.8}}/>
          <div style={{position:'absolute',left:`${(todayOff/span)*100}%`,top:2,background:'var(--red)',color:'#fff',fontSize:10,padding:'2px 8px',borderRadius:4,transform:'translateX(-50%)',whiteSpace:'nowrap',fontWeight:700}}>HOY</div>
        </div>
        {stages.map((stage,si)=><div key={stage.id} style={{marginBottom:8}}>
          <div style={{display:'flex',alignItems:'center',marginBottom:4}}>
            <div style={{width:275,flexShrink:0,fontFamily:"'Bebas Neue',sans-serif",fontSize:12,letterSpacing:1,color:'var(--accent)',paddingRight:12,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{stage.name}</div>
            <div style={{flex:1,height:6,background:'var(--surface2)',borderRadius:4,position:'relative'}}>
              <div style={{position:'absolute',left:`${(todayOff/span)*100}%`,top:-4,bottom:-4,width:1,background:'var(--red)',opacity:.3}}/>
            </div>
          </div>
          {stage.activities.flatMap(a=>a.tasks.map(task=>{
            const st=calcStatus(task);
            const bc=st.cls==='bg2'?'#22c55e':st.cls==='br'?'#ef4444':st.cls==='bb'?'#3b82f6':st.cls==='ba'?'#f59e0b':'#4a5568';
            return<div key={task.id} style={{display:'flex',alignItems:'center',marginBottom:4}}>
              <div style={{width:275,flexShrink:0,fontSize:11,color:'var(--text2)',paddingRight:12,paddingLeft:16,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}} title={task.name}>· {task.name}</div>
              <div style={{flex:1,position:'relative',height:22}}>
                <div style={{position:'absolute',left:`${(todayOff/span)*100}%`,top:0,bottom:0,width:1,background:'var(--red)',opacity:.2}}/>
                <div style={{position:'absolute',left:`${L(task)}%`,width:`${W(task)}%`,height:22,background:`${bc}16`,border:`1px solid ${bc}40`,borderRadius:4,overflow:'hidden',cursor:'default',transition:'filter .15s',top:0,display:'flex',alignItems:'center',padding:'0 7px'}}
                  title={`${task.name} · ${s2p(task.stars)}%`}
                  onMouseEnter={e=>e.currentTarget.style.filter='brightness(1.4)'}
                  onMouseLeave={e=>e.currentTarget.style.filter='none'}>
                  {s2p(task.stars)>0&&<div style={{position:'absolute',left:0,top:0,bottom:0,width:`${s2p(task.stars)}%`,background:`${bc}30`,borderRadius:3}}/>}
                  <span style={{position:'relative',zIndex:1,fontSize:10,fontWeight:700,color:bc,whiteSpace:'nowrap'}}>{s2p(task.stars)}%</span>
                </div>
              </div>
            </div>;
          }))}
        </div>)}
        <div style={{display:'flex',gap:14,marginTop:18,paddingTop:14,borderTop:'1px solid var(--border)',flexWrap:'wrap'}}>
          {[['#22c55e','Ejecutado en plazo'],['#f59e0b','Fuera de plazo — ejecutado'],['#3b82f6','En proceso – en plazo'],['#ef4444','Fuera de plazo'],['#4a5568','No iniciado']].map(([c,l])=>(
            <div key={l} style={{display:'flex',alignItems:'center',gap:6,fontSize:11,color:'var(--text2)'}}>
              <div style={{width:12,height:12,background:c,borderRadius:3,opacity:.7}}/>{l}
            </div>
          ))}
        </div>
      </div>
    </div>
  </div>;
}

function TeamView({session,selProj,showToast,canAdmin}){
  const [users,setUsers]=useState([]);
  const [allTasks,setAllTasks]=useState([]);
  const [modal,setModal]=useState(false);
  const [form,setForm]=useState({name:'',email:'',password:''});
  const [loading,setLoading]=useState(true);

  const load=async()=>{
    setLoading(true);
    const [u,allProj]=await Promise.all([DB.getUsers(session.id),DB.getAllProjects()]);
    setUsers(u);
    const proj=allProj.find(p=>p.id===selProj);
    if(proj){
      const stages=await DB.getStages(proj.id);
      const acts=await Promise.all(stages.map(s=>DB.getActivities(s.id)));
      const tasks=await Promise.all(acts.flat().map(a=>DB.getTasks(a.id)));
      setAllTasks(tasks.flat());
    }
    setLoading(false);
  };
  useEffect(()=>{load();},[selProj]);

  const createUser=async()=>{
    if(!form.name||!form.email||!form.password){showToast('Completa todos los campos','err');return;}
    const nu={id:uid('u'),name:form.name,email:form.email,password:form.password,admin_id:session.id};
    await DB.saveUser(nu);showToast('Usuario creado');setModal(false);setForm({name:'',email:'',password:''});load();
  };

  if(loading)return<Loader/>;

  return<div>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:24}}>
      <Hdr title="EQUIPO DEL PROYECTO" sub="" noMb/>
      <button className="btn btn-p" onClick={()=>setModal(true)}>+ Nuevo Usuario</button>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(260px,1fr))',gap:16}}>
      {users.map((u,i)=>{
        const myT=allTasks.filter(t=>t.responsible_id===u.id);
        const pct=myT.length?Math.round(myT.reduce((a,t)=>a+s2p(t.stars),0)/myT.length):0;
        return<div key={u.id} className="card" style={{border:'1px solid var(--border2)'}}>
          <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:14}}>
            <Av name={u.name} size={44}/>
            <div><div style={{fontWeight:700,fontSize:14}}>{u.name}</div>
            <div style={{fontSize:11,color:'var(--text3)',marginTop:2}}>{u.email}</div></div>
          </div>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:12,color:'var(--text2)',marginBottom:7}}>
            <span>{myT.length} tareas</span>
            <span style={{fontFamily:"'JetBrains Mono',monospace",color:'var(--accent)',fontWeight:700}}>{pct}%</span>
          </div>
          <div className="pb" style={{marginBottom:14}}><div className="pf" style={{width:`${pct}%`,background:COLS[i%COLS.length]}}/></div>
          <div style={{display:'flex',gap:8,justifyContent:'space-between'}}>
            <span className="badge bb">👤 Usuario</span>
            <button className="btn btn-d btn-s" onClick={async()=>{await DB.delUser(u.id);showToast('Usuario eliminado');load();}}>✕</button>
          </div>
        </div>;
      })}
    </div>
    {modal&&<div className="mo" onClick={e=>e.target===e.currentTarget&&setModal(false)}>
      <div className="md" style={{maxWidth:420}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18}}>
          <div style={{fontWeight:700,fontSize:16}}>Nuevo Usuario</div>
          <button className="btn btn-g btn-s" onClick={()=>setModal(false)}>✕</button>
        </div>
        <div className="fg"><label className="lbl">Nombre completo</label><input className="input" value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))}/></div>
        <div className="fg"><label className="lbl">Correo electrónico</label><input className="input" type="email" value={form.email} onChange={e=>setForm(p=>({...p,email:e.target.value}))}/></div>
        <div className="fg"><label className="lbl">Contraseña inicial</label><input className="input" type="password" value={form.password} onChange={e=>setForm(p=>({...p,password:e.target.value}))}/></div>
        <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
          <button className="btn btn-g" onClick={()=>setModal(false)}>Cancelar</button>
          <button className="btn btn-p" onClick={createUser}>Crear usuario</button>
        </div>
      </div>
    </div>}
  </div>;
}

function StagesView({session,selProj,showToast,canAdmin}){
  const [struct,setStruct]=useState([]);
  const [allUsers,setAllUsers]=useState([]);
  const [proj,setProj]=useState(null);
  const [modal,setModal]=useState(null);
  const [form,setForm]=useState({name:'',stageId:'',actId:'',responsible:'',startDate:'',endDate:''});
  const [loading,setLoading]=useState(true);

  const load=async()=>{
    if(!selProj){setLoading(false);return;}
    setLoading(true);
    const [allProj,u]=await Promise.all([DB.getAllProjects(),DB.getAllUsers()]);
    const p=allProj.find(x=>x.id===selProj);setProj(p);setAllUsers(u);
    if(!p){setLoading(false);return;}
    const stages=await DB.getStages(p.id);
    const full=await Promise.all(stages.map(async s=>{
      const acts=await DB.getActivities(s.id);
      const withTasks=await Promise.all(acts.map(async a=>({...a,tasks:await DB.getTasks(a.id)})));
      return{...s,activities:withTasks};
    }));
    setStruct(full);setLoading(false);
  };
  useEffect(()=>{load();},[selProj]);

  if(loading)return<Loader/>;
  if(!proj)return<NoProj/>;

  const projUsers=allUsers.filter(u=>u.admin_id===session.id||(session.role==='superadmin'));

  const addStage=async()=>{
    if(!form.name){showToast('Ingresa el nombre','err');return;}
    await DB.saveStage({id:uid('s'),project_id:selProj,name:form.name,order_num:struct.length+1});
    showToast('Etapa creada');setModal(null);load();
  };
  const addAct=async()=>{
    if(!form.name||!form.stageId){showToast('Completa los campos','err');return;}
    await DB.saveActivity({id:uid('a'),stage_id:form.stageId,name:form.name});
    showToast('Actividad creada');setModal(null);load();
  };
  const addTask=async()=>{
    if(!form.name||!form.actId||!form.responsible||!form.startDate||!form.endDate){showToast('Completa todos los campos','err');return;}
    await DB.saveTask({id:uid('t'),activity_id:form.actId,name:form.name,responsible_id:form.responsible,start_date:form.startDate,end_date:form.endDate,stars:0,evidence:'[]',rescheduled:0,reschedule_pending:false});
    showToast('Tarea creada');setModal(null);load();
  };

  return<div>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:24,flexWrap:'wrap',gap:10}}>
      <Hdr title="ESTRUCTURA DEL PROYECTO" sub={proj.name} noMb/>
      <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
        <button className="btn btn-g btn-s" onClick={()=>{setForm(p=>({...p,name:''}));setModal('stage');}}>+ Etapa</button>
        <button className="btn btn-g btn-s" onClick={()=>{setForm(p=>({...p,name:'',stageId:''}));setModal('act');}}>+ Actividad</button>
        <button className="btn btn-p btn-s" onClick={()=>{setForm({name:'',stageId:'',actId:'',responsible:'',startDate:'',endDate:''});setModal('task');}}>+ Tarea</button>
      </div>
    </div>

    {struct.map((stage,si)=><div key={stage.id} className="card" style={{marginBottom:14,padding:0,overflow:'hidden',border:'1px solid var(--border2)'}}>
      <div style={{padding:'12px 20px',background:'var(--surface2)',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',gap:12}}>
        <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:14,color:'var(--accent)',letterSpacing:1,flex:1}}>ETAPA {si+1}: {stage.name}</span>
        <span style={{fontSize:11,color:'var(--text3)'}}>{stage.activities.length} actividades · {stage.activities.reduce((a,act)=>a+act.tasks.length,0)} tareas</span>
      </div>
      {stage.activities.map((act,ai)=><div key={act.id}>
        <div style={{padding:'9px 20px 9px 32px',background:'rgba(255,255,255,.015)',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center'}}>
          <span style={{fontWeight:600,fontSize:13,flex:1}}>Actividad {si+1}.{ai+1}: {act.name}</span>
          <span style={{fontSize:11,color:'var(--text3)'}}>{act.tasks.length} tareas</span>
        </div>
        {act.tasks.map((task,ti)=>{
          const u=allUsers.find(x=>x.id===task.responsible_id)||{name:'Sin asignar'};
          return<div key={task.id} style={{display:'flex',alignItems:'center',gap:12,padding:'8px 20px 8px 52px',borderBottom:'1px solid var(--border)',fontSize:12,flexWrap:'wrap'}}>
            <span style={{flex:1,minWidth:150}}>{si+1}.{ai+1}.{ti+1} {task.name}</span>
            <span style={{color:'var(--text2)'}}>{u.name}</span>
            <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:'var(--text3)'}}>{new Date(task.start_date).toLocaleDateString('es-PE')} → {new Date(task.end_date).toLocaleDateString('es-PE')} ({diffD(task.start_date,task.end_date)}d)</span>
            <span style={{fontFamily:"'JetBrains Mono',monospace",color:'var(--accent)',fontWeight:700}}>{s2p(task.stars)}%</span>
          </div>;
        })}
      </div>)}
    </div>)}

    {modal==='stage'&&<div className="mo" onClick={e=>e.target===e.currentTarget&&setModal(null)}>
      <div className="md" style={{maxWidth:400}}>
        <div style={{fontWeight:700,fontSize:16,marginBottom:18}}>Nueva Etapa</div>
        <div className="fg"><label className="lbl">Nombre</label><input className="input" placeholder="Ej: ACABADOS" value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))}/></div>
        <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}><button className="btn btn-g" onClick={()=>setModal(null)}>Cancelar</button><button className="btn btn-p" onClick={addStage}>Crear</button></div>
      </div>
    </div>}

    {modal==='act'&&<div className="mo" onClick={e=>e.target===e.currentTarget&&setModal(null)}>
      <div className="md" style={{maxWidth:420}}>
        <div style={{fontWeight:700,fontSize:16,marginBottom:18}}>Nueva Actividad</div>
        <div className="fg"><label className="lbl">Etapa</label>
          <select className="input" value={form.stageId} onChange={e=>setForm(p=>({...p,stageId:e.target.value}))}>
            <option value="">Seleccionar etapa...</option>
            {struct.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
          </select>
        </div>
        <div className="fg"><label className="lbl">Nombre</label><input className="input" placeholder="Ej: Excavación masiva" value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))}/></div>
        <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}><button className="btn btn-g" onClick={()=>setModal(null)}>Cancelar</button><button className="btn btn-p" onClick={addAct}>Crear</button></div>
      </div>
    </div>}

    {modal==='task'&&<div className="mo" onClick={e=>e.target===e.currentTarget&&setModal(null)}>
      <div className="md" style={{maxWidth:500}}>
        <div style={{fontWeight:700,fontSize:16,marginBottom:18}}>Nueva Tarea</div>
        <div className="fg"><label className="lbl">Actividad</label>
          <select className="input" value={form.actId} onChange={e=>setForm(p=>({...p,actId:e.target.value}))}>
            <option value="">Seleccionar actividad...</option>
            {struct.flatMap(s=>s.activities.map(a=><option key={a.id} value={a.id}>{s.name} → {a.name}</option>))}
          </select>
        </div>
        <div className="fg"><label className="lbl">Nombre de la tarea</label><input className="input" placeholder="Ej: Vaciado de concreto" value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))}/></div>
        <div className="fg"><label className="lbl">Responsable</label>
          <select className="input" value={form.responsible} onChange={e=>setForm(p=>({...p,responsible:e.target.value}))}>
            <option value="">Seleccionar usuario...</option>
            {projUsers.map(u=><option key={u.id} value={u.id}>{u.name}</option>)}
          </select>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
          <div className="fg"><label className="lbl">Fecha inicio 📅</label><input className="input" type="date" value={form.startDate} onChange={e=>setForm(p=>({...p,startDate:e.target.value}))}/></div>
          <div className="fg"><label className="lbl">Fecha fin 📅</label><input className="input" type="date" value={form.endDate} onChange={e=>setForm(p=>({...p,endDate:e.target.value}))}/></div>
        </div>
        {form.startDate&&form.endDate&&<div style={{background:'rgba(245,158,11,.08)',border:'1px solid rgba(245,158,11,.15)',borderRadius:8,padding:'8px 14px',fontSize:12,color:'var(--accent)',marginBottom:14}}>
          ⏱ Duración: <strong>{diffD(form.startDate,form.endDate)} días calendarios</strong>
        </div>}
        <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}><button className="btn btn-g" onClick={()=>setModal(null)}>Cancelar</button><button className="btn btn-p" onClick={addTask}>Crear tarea</button></div>
      </div>
    </div>}
  </div>;
}

// ─── ADMINS ───────────────────────────────────────────────────────
function AdminsView({session,showToast}){
  const [admins,setAdmins]=useState([]);
  const [modal,setModal]=useState(false);
  const [form,setForm]=useState({name:'',email:'',password:'',company:''});
  const load=async()=>{const a=await DB.getAdmins();setAdmins(a);};
  useEffect(()=>{load();},[]);
  const create=async()=>{
    if(!form.name||!form.email||!form.password){showToast('Completa todos los campos','err');return;}
    await DB.saveAdmin({id:uid('adm'),name:form.name,email:form.email,password:form.password,company:form.company});
    showToast('Administrador creado');setModal(false);setForm({name:'',email:'',password:'',company:''});load();
  };
  return<div>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:24}}>
      <Hdr title="ADMINISTRADORES" sub="Gestión de cuentas de administrador" noMb/>
      <button className="btn btn-p" onClick={()=>setModal(true)}>+ Nuevo Administrador</button>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(300px,1fr))',gap:16}}>
      {admins.map(adm=><div key={adm.id} className="card" style={{border:'1px solid var(--border2)'}}>
        <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:16}}>
          <div style={{width:48,height:48,borderRadius:12,background:'linear-gradient(135deg,#1e3a5f,#0f2340)',border:'1px solid rgba(59,130,246,.3)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:22}}>🏢</div>
          <div>
            <div style={{fontWeight:700,fontSize:15}}>{adm.name}</div>
            <div style={{fontSize:11,color:'var(--text3)'}}>{adm.company||'Sin empresa'}</div>
            <div style={{fontSize:11,color:'var(--text3)'}}>{adm.email}</div>
          </div>
        </div>
        <div style={{display:'flex',gap:8,justifyContent:'space-between',alignItems:'center'}}>
          <span className="badge ba">⭐ Plan Activo</span>
          <button className="btn btn-d btn-s" onClick={async()=>{await DB.delAdmin(adm.id);showToast('Admin eliminado');load();}}>✕</button>
        </div>
      </div>)}
    </div>
    {modal&&<div className="mo" onClick={e=>e.target===e.currentTarget&&setModal(false)}>
      <div className="md" style={{maxWidth:440}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18}}>
          <div style={{fontWeight:700,fontSize:16}}>Nuevo Administrador</div>
          <button className="btn btn-g btn-s" onClick={()=>setModal(false)}>✕</button>
        </div>
        <div className="fg"><label className="lbl">Nombre</label><input className="input" value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))}/></div>
        <div className="fg"><label className="lbl">Empresa</label><input className="input" placeholder="Ej: Constructora ABC SAC" value={form.company} onChange={e=>setForm(p=>({...p,company:e.target.value}))}/></div>
        <div className="fg"><label className="lbl">Email</label><input className="input" type="email" value={form.email} onChange={e=>setForm(p=>({...p,email:e.target.value}))}/></div>
        <div className="fg"><label className="lbl">Contraseña</label><input className="input" type="password" value={form.password} onChange={e=>setForm(p=>({...p,password:e.target.value}))}/></div>
        <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}><button className="btn btn-g" onClick={()=>setModal(false)}>Cancelar</button><button className="btn btn-p" onClick={create}>Crear</button></div>
      </div>
    </div>}
  </div>;
}

// ─── NEW PROJECT ──────────────────────────────────────────────────
function NewProjView({session,showToast,onCreated}){
  const [form,setForm]=useState({name:'',description:'',startDate:fmtToday,endDate:fmt(addD(TODAY,180))});
  const create=async()=>{
    if(!form.name||!form.startDate||!form.endDate){showToast('Completa los campos requeridos','err');return;}
    const id=uid('p');
    await DB.saveProject({id,name:form.name,description:form.description,admin_id:session.id,start_date:form.startDate,end_date:form.endDate});
    showToast('Proyecto creado 🎉');onCreated(id);
  };
  return<div style={{maxWidth:580}}>
    <Hdr title="NUEVO PROYECTO" sub=""/>
    <div className="card" style={{border:'1px solid var(--border2)'}}>
      <div className="fg"><label className="lbl">Nombre del proyecto *</label><input className="input" placeholder="Ej: Edificio Residencial Los Álamos" value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))}/></div>
      <div className="fg"><label className="lbl">Descripción</label><textarea className="input" rows={3} placeholder="Descripción general..." value={form.description} onChange={e=>setForm(p=>({...p,description:e.target.value}))} style={{resize:'none'}}/></div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
        <div className="fg"><label className="lbl">Fecha de inicio 📅 *</label><input className="input" type="date" value={form.startDate} onChange={e=>setForm(p=>({...p,startDate:e.target.value}))}/></div>
        <div className="fg"><label className="lbl">Fecha de fin 📅 *</label><input className="input" type="date" value={form.endDate} onChange={e=>setForm(p=>({...p,endDate:e.target.value}))}/></div>
      </div>
      {form.startDate&&form.endDate&&<div style={{background:'rgba(245,158,11,.08)',border:'1px solid rgba(245,158,11,.15)',borderRadius:8,padding:'10px 14px',fontSize:13,color:'var(--accent)',marginBottom:16}}>
        📅 Duración: <strong>{diffD(form.startDate,form.endDate)} días calendarios</strong>
      </div>}
      <button className="btn btn-p" style={{width:'100%',justifyContent:'center'}} onClick={create}>Crear Proyecto →</button>
    </div>
  </div>;
}

// ─── PROFILE ──────────────────────────────────────────────────────
function ProfileView({session,showToast,setSession}){
  const [form,setForm]=useState({name:session.name,email:session.email,currP:'',newP:'',confP:''});
  const save=async()=>{
    if(form.newP&&form.newP!==form.confP){showToast('Las contraseñas no coinciden','err');return;}
    if(form.newP&&form.currP!==session.password){showToast('Contraseña actual incorrecta','err');return;}
    const patch={name:form.name,email:form.email,...(form.newP?{password:form.newP}:{})};
    if(session.role==='admin') await DB.saveAdmin({...session,...patch});
    else if(session.role==='user') await DB.saveUser({...session,...patch});
    setSession(p=>({...p,...patch}));
    showToast('Perfil actualizado ✓');
    setForm(p=>({...p,currP:'',newP:'',confP:''}));
  };
  return<div style={{maxWidth:520}}>
    <Hdr title="MI PERFIL" sub=""/>
    <div className="card" style={{border:'1px solid var(--border2)'}}>
      <div style={{display:'flex',alignItems:'center',gap:16,marginBottom:22,paddingBottom:20,borderBottom:'1px solid var(--border)'}}>
        <div style={{width:62,height:62,borderRadius:16,background:'linear-gradient(135deg,var(--accent),var(--accent2))',display:'flex',alignItems:'center',justifyContent:'center',fontSize:24,fontWeight:700,color:'#000'}}>{ini(session.name)}</div>
        <div>
          <div style={{fontWeight:700,fontSize:18}}>{session.name}</div>
          <div style={{fontSize:12,color:'var(--text3)',marginTop:2}}>{session.email}</div>
          <span className="badge ba" style={{marginTop:6,display:'inline-flex'}}>{session.role==='superadmin'?'🛡 Super Admin':session.role==='admin'?'⚙ Administrador':'👤 Usuario'}</span>
        </div>
      </div>
      <div className="fg"><label className="lbl">Nombre completo</label><input className="input" value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))}/></div>
      <div className="fg"><label className="lbl">Correo electrónico</label><input className="input" type="email" value={form.email} onChange={e=>setForm(p=>({...p,email:e.target.value}))}/></div>
      <div style={{fontWeight:600,fontSize:13,marginBottom:14,marginTop:18,color:'var(--text2)',paddingTop:18,borderTop:'1px solid var(--border)'}}>Cambiar contraseña</div>
      <div className="fg"><label className="lbl">Contraseña actual</label><input className="input" type="password" placeholder="Tu contraseña actual" value={form.currP} onChange={e=>setForm(p=>({...p,currP:e.target.value}))}/></div>
      <div className="fg"><label className="lbl">Nueva contraseña</label><input className="input" type="password" placeholder="Nueva contraseña" value={form.newP} onChange={e=>setForm(p=>({...p,newP:e.target.value}))}/></div>
      <div className="fg"><label className="lbl">Confirmar contraseña</label><input className="input" type="password" placeholder="Repite la nueva contraseña" value={form.confP} onChange={e=>setForm(p=>({...p,confP:e.target.value}))}/></div>
      <button className="btn btn-p" style={{width:'100%',justifyContent:'center',marginTop:6}} onClick={save}>💾 Guardar cambios</button>
    </div>
  </div>;
}

      </div>)}

// ─── MICRO COMPONENTS ─────────────────────────────────────────────
function Hdr({title,sub,noMb=false}){
  return<div style={{marginBottom:noMb?0:24}}>
    <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:26,color:'var(--accent)',letterSpacing:1}}>{title}</div>
    {sub&&<div style={{color:'var(--text2)',fontSize:13,marginTop:1}}>{sub}</div>}
  </div>;
}
function Loader(){
  return<div style={{display:'flex',alignItems:'center',justifyContent:'center',padding:'80px 0',gap:12,color:'var(--text3)'}}>
    <div className="spin" style={{width:20,height:20,border:'2px solid var(--border2)',borderTop:'2px solid var(--accent)',borderRadius:'50%'}}/>
    <span style={{fontSize:13}}>Cargando...</span>
  </div>;
}
function NoProj(){
  return<div style={{textAlign:'center',padding:'80px 0',color:'var(--text3)'}}>
    <div style={{fontSize:52,marginBottom:16}}>🏗</div>

    <div style={{fontSize:13,marginTop:6}}>Usa el menú lateral para navegar</div>
  </div>;
}
